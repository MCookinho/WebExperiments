<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 3 - Web Experiments</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d1b4e 0%, #1a1a2e 50%, #0d0221 100%);
            color: #fff;
            padding: 2rem;
            text-align: center;
        }
        .container { max-width: 600px; }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #ff00ff, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            font-size: 1.1rem;
            color: #a0a0a0;
            margin-bottom: 2rem;
            line-height: 1.8;
        }
        .back-link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: #ff00ff;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 0, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Exemplo 3</h1>
        <p>Este é o terceiro projeto de exemplo! Explore e divirta-se com os experimentos web.</p>
        <a href="../../index.html" class="back-link">← Voltar ao Web Experiments</a>
    </div>
</body>
</html>
