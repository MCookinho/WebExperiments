<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - TechVault Corp</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 60px);
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }
        .error-page h2 {
            margin: 1rem 0;
            font-size: 1.5rem;
        }
        .error-page p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">TechVault<span>Corp</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <div class="error-page">
        <div class="error-code">404</div>
        <h2>Página não encontrada</h2>
        <p>O recurso que você procura não existe ou foi movido.</p>
        <a href="index.html" class="btn-primary">Voltar ao Início</a>
    </div>
</body>
</html>
