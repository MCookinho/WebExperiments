<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechVault Corp</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">TechVault<span>Corp</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="flags.html">Submit Flags</a>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <h2>Sign In</h2>
            <p class="subtitle">Access the admin panel</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password">
                </div>
                <button type="submit" class="login-btn">Sign In</button>
                <p class="login-error" id="loginError">Invalid credentials. Please try again.</p>
            </form>
            <div class="login-footer">
                <p>v3.2.1 | Environment: production</p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
