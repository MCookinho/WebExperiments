<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechVault Corp</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">TechVault<span>Corp</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <h2>Entrar</h2>
            <p class="subtitle">Acesse o painel administrativo</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" placeholder="Digite seu usuário" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Digite sua senha">
                </div>
                <button type="submit" class="login-btn">Entrar</button>
                <p class="login-error" id="loginError">Credenciais inválidas. Tente novamente.</p>
            </form>
            <div class="login-footer">
                <p>v3.2.1 | Ambiente: production</p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
