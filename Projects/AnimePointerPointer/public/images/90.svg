<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg90" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow90">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg90)"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#ff6b9d" stroke-opacity="0.1" stroke-width="2"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#ff6b9d" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Body -->
  <path d="M140,210 Q200,200 260,210 L250,360 L150,360 Z" fill="#4a90d9" opacity="0.9"/>

  <!-- Left arm (resting) -->
  <path d="M145,220 Q100,290 120,330" fill="none" stroke="#fce4d6" stroke-width="18" stroke-linecap="round"/>

  <!-- Right arm (pointing) -->
  <path d="M255,220 Q288.06669006610525,220 357.6,117.6" fill="none" stroke="#fce4d6" stroke-width="18" stroke-linecap="round"/>

  <!-- Hand/finger -->
  <circle cx="357.6" cy="117.6" r="10" fill="#fce4d6"/>
  <line x1="357.6" y1="117.6" x2="344.30724798769853" y2="124.55001754957894" stroke="#fce4d6" stroke-width="6" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="200" cy="120" rx="45" ry="50" fill="#fce4d6"/>

  <!-- Hair -->
  
    <path d="M150,100 Q170,60 200,65 Q230,60 250,100" fill="#ff6b9d"/>
    <path d="M150,100 Q145,130 155,150" fill="#ff6b9d"/>
    <path d="M250,100 Q255,130 245,150" fill="#ff6b9d"/>
  

  <!-- Eyes (anime style) -->
  <ellipse cx="184" cy="115" rx="8" ry="10" fill="#fff"/>
  <ellipse cx="216" cy="115" rx="8" ry="10" fill="#fff"/>
  <ellipse cx="186" cy="117" rx="5" ry="7" fill="#222"/>
  <ellipse cx="214" cy="117" rx="5" ry="7" fill="#222"/>
  <circle cx="188" cy="114" r="2" fill="#fff"/>
  <circle cx="216" cy="114" r="2" fill="#fff"/>

  <!-- Mouth -->
  <path d="M195,135 Q200,140 205,135" fill="none" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>

  <!-- Finger indicator glow -->
  <circle cx="357.6" cy="117.6" r="20" fill="#ff6b9d" opacity="0.15" filter="url(#glow90)"/>
  <text x="357.6" y="92.6" text-anchor="middle" fill="#ff6b9d" font-size="10" font-family="monospace" opacity="0.4">✦</text>
</svg>