  <line x1="338.4" y1="267.2" x2="324.9065019487914" y2="260.64824372080045" stroke="#f5d0b0" stroke-width="6" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="200" cy="120" rx="45" ry="50" fill="#f5d0b0"/>

  <!-- Hair -->
  
    <ellipse cx="200" cy="105" rx="50" ry="40" fill="#ff8c00"/>
    <path d="M155,120 Q140,160 170,180" fill="#ff8c00"/>
    <path d="M245,120 Q260,160 230,180" fill="#ff8c00"/>
  

  <!-- Eyes (anime style) -->
  <ellipse cx="184" cy="115" rx="8" ry="10" fill="#fff"/>
  <ellipse cx="216" cy="115" rx="8" ry="10" fill="#fff"/>
  <ellipse cx="186" cy="117" rx="5" ry="7" fill="#222"/>
  <ellipse cx="214" cy="117" rx="5" ry="7" fill="#222"/>
  <circle cx="188" cy="114" r="2" fill="#fff"/>
  <circle cx="216" cy="114" r="2" fill="#fff"/>

  <!-- Mouth -->
