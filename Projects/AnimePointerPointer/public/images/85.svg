<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg85" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1b2d3d" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow85">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg85)"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#ff8c00" stroke-opacity="0.1" stroke-width="2"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#ff8c00" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Body -->
  <path d="M140,210 Q200,200 260,210 L250,360 L150,360 Z" fill="#00bcd4" opacity="0.9"/>

