<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg98" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a2e2e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow98">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg98)"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#00e5ff" stroke-opacity="0.1" stroke-width="2"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#00e5ff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Body -->
  <path d="M140,210 Q200,200 260,210 L250,360 L150,360 Z" fill="#673ab7" opacity="0.9"/>

  <!-- Left arm (resting) -->
  <path d="M145,220 Q100,290 120,330" fill="none" stroke="#fce4d6" stroke-width="18" stroke-linecap="round"/>

  <!-- Right arm (pointing) -->
  <path d="M255,220 Q144.71392730514603,220 99.6,226.39999999999998" fill="none" stroke="#fce4d6" stroke-width="18" stroke-linecap="round"/>

  <!-- Hand/finger -->
  <circle cx="99.6" cy="226.39999999999998" r="10" fill="#fce4d6"/>
  <line x1="99.6" y1="226.39999999999998" x2="114.10686643645852" y2="222.5854454788595" stroke="#fce4d6" stroke-width="6" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="200" cy="120" rx="45" ry="50" fill="#fce4d6"/>

  <!-- Hair -->
  
    <path d="M145,120 Q180,50 210,55 Q250,65 255,120" fill="#00e5ff"/>
    <path d="M152,125 L145,165" fill="none" stroke="#00e5ff" stroke-width="12" stroke-linecap="round"/>
    <path d="M248,125 L255,165" fill="none" stroke="#00e5ff" stroke-width="12" stroke-linecap="round"/>
  

  <!-- Eyes (anime style) -->
  <ellipse cx="184" cy="115" rx="8" ry="10" fill="#fff"/>
  <ellipse cx="216" cy="115" rx="8" ry="10" fill="#fff"/>
  <ellipse cx="186" cy="117" rx="5" ry="7" fill="#222"/>
  <ellipse cx="214" cy="117" rx="5" ry="7" fill="#222"/>
  <circle cx="188" cy="114" r="2" fill="#fff"/>
  <circle cx="216" cy="114" r="2" fill="#fff"/>

  <!-- Mouth -->
  <path d="M195,135 Q200,140 205,135" fill="none" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>

  <!-- Finger indicator glow -->
  <circle cx="99.6" cy="226.39999999999998" r="20" fill="#00e5ff" opacity="0.15" filter="url(#glow98)"/>
  <text x="99.6" y="201.39999999999998" text-anchor="middle" fill="#00e5ff" font-size="10" font-family="monospace" opacity="0.4">✦</text>
</svg>