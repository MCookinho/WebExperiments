<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg17" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#3e2e1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow17">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg17)"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#e91e63" stroke-opacity="0.1" stroke-width="2"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#e91e63" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Body -->
  <path d="M140,210 Q200,200 260,210 L250,360 L150,360 Z" fill="#ff9800" opacity="0.9"/>

  <!-- Left arm (resting) -->
  <path d="M145,220 Q100,290 120,330" fill="none" stroke="#f5d0b0" stroke-width="18" stroke-linecap="round"/>

  <!-- Right arm (pointing) -->
  <path d="M255,220 Q116.22743516199982,220 41.6,237.2" fill="none" stroke="#f5d0b0" stroke-width="18" stroke-linecap="round"/>

  <!-- Hand/finger -->
  <circle cx="41.6" cy="237.2" r="10" fill="#f5d0b0"/>
  <line x1="41.6" y1="237.2" x2="56.20270706329087" y2="233.77057637149986" stroke="#f5d0b0" stroke-width="6" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="200" cy="120" rx="45" ry="50" fill="#f5d0b0"/>

  <!-- Hair -->
  
    <path d="M145,120 Q180,50 210,55 Q250,65 255,120" fill="#e91e63"/>
    <path d="M152,125 L145,165" fill="none" stroke="#e91e63" stroke-width="12" stroke-linecap="round"/>
    <path d="M248,125 L255,165" fill="none" stroke="#e91e63" stroke-width="12" stroke-linecap="round"/>
  

  <!-- Eyes (anime style) -->
  <ellipse cx="184" cy="115" rx="8" ry="10" fill="#fff"/>
  <ellipse cx="216" cy="115" rx="8" ry="10" fill="#fff"/>
  <ellipse cx="186" cy="117" rx="5" ry="7" fill="#222"/>
  <ellipse cx="214" cy="117" rx="5" ry="7" fill="#222"/>
  <circle cx="188" cy="114" r="2" fill="#fff"/>
  <circle cx="216" cy="114" r="2" fill="#fff"/>

  <!-- Mouth -->
  <path d="M195,135 Q200,140 205,135" fill="none" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>

  <!-- Finger indicator glow -->
  <circle cx="41.6" cy="237.2" r="20" fill="#e91e63" opacity="0.15" filter="url(#glow17)"/>
  <text x="41.6" y="212.2" text-anchor="middle" fill="#e91e63" font-size="10" font-family="monospace" opacity="0.4">✦</text>
</svg>