<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg71" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1e3d" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow71">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg71)"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#ffd700" stroke-opacity="0.1" stroke-width="2"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#ffd700" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Body -->
  <path d="M140,210 Q200,200 260,210 L250,360 L150,360 Z" fill="#e74c3c" opacity="0.9"/>

  <!-- Left arm (resting) -->
  <path d="M145,220 Q100,290 120,330" fill="none" stroke="#f5d0b0" stroke-width="18" stroke-linecap="round"/>

  <!-- Right arm (pointing) -->
  <path d="M255,220 Q285.4760967941013,220 362,162.79999999999998" fill="none" stroke="#f5d0b0" stroke-width="18" stroke-linecap="round"/>

  <!-- Hand/finger -->
  <circle cx="362" cy="162.79999999999998" r="10" fill="#f5d0b0"/>
  <line x1="362" y1="162.79999999999998" x2="347.3804903095886" y2="166.15707259557593" stroke="#f5d0b0" stroke-width="6" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="200" cy="120" rx="45" ry="50" fill="#f5d0b0"/>

  <!-- Hair -->
  
    <path d="M145,120 Q180,50 210,55 Q250,65 255,120" fill="#ffd700"/>
    <path d="M152,125 L145,165" fill="none" stroke="#ffd700" stroke-width="12" stroke-linecap="round"/>
    <path d="M248,125 L255,165" fill="none" stroke="#ffd700" stroke-width="12" stroke-linecap="round"/>
  

  <!-- Eyes (anime style) -->
  <ellipse cx="184" cy="115" rx="8" ry="10" fill="#fff"/>
  <ellipse cx="216" cy="115" rx="8" ry="10" fill="#fff"/>
  <ellipse cx="186" cy="117" rx="5" ry="7" fill="#222"/>
  <ellipse cx="214" cy="117" rx="5" ry="7" fill="#222"/>
  <circle cx="188" cy="114" r="2" fill="#fff"/>
  <circle cx="216" cy="114" r="2" fill="#fff"/>

  <!-- Mouth -->
  <path d="M195,135 Q200,140 205,135" fill="none" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/>

  <!-- Finger indicator glow -->
  <circle cx="362" cy="162.79999999999998" r="20" fill="#ffd700" opacity="0.15" filter="url(#glow71)"/>
  <text x="362" y="137.79999999999998" text-anchor="middle" fill="#ffd700" font-size="10" font-family="monospace" opacity="0.4">✦</text>
</svg>