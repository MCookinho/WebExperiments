<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace}
canvas#game-canvas{display:block}

#overlay{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;color:#fff}

#overlay .controls-info{margin-top:1rem;padding:1.5rem 2.5rem;border:1px solid #222;border-radius:4px;background:rgba(255,0,64,0.02);font-size:0.85rem;line-height:2}
#overlay .controls-info span{color:#ff0040;font-weight:bold}
#start-btn{margin-top:2rem;padding:1rem 3rem;font-size:1.3rem;font-family:'Courier New',monospace;font-weight:700;background:#ff0040;color:#fff;border:none;border-radius:2px;cursor:pointer;text-transform:uppercase;letter-spacing:4px;transition:all .3s}
#start-btn:hover{background:#ff2060;box-shadow:0 0 40px rgba(255,0,64,.6)}

#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;pointer-events:none;display:none}

#stamina-hint{position:fixed;bottom:42px;left:50%;transform:translateX(-50%);font-size:.65rem;color:rgba(255,255,255,.3);z-index:100;display:none}

#death-text{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3rem;color:#ff0040;z-index:2001;display:none;text-shadow:0 0 20px #ff0040;font-weight:700;letter-spacing:5px}

#loading{position:fixed;inset:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1001;color:#fff}

#loading p{color:#666;font-size:.9rem}

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

const $ = id => document.getElementById(id);

/* ─── CONSTANTS ─── */
const PR = 0.35;
const EYE = 1.7;
const GRAV = -28;
const JUMP = 9.5;
const WALK = 6;
const RUN = 10.5;
const BOT_BASE = 7;
const BOT_FAST = 12;
const CAP_R = 1.8;
const MAX_STAM = 100;
const STAM_DRAIN = 28;
const STAM_REGEN = 10;

/* ─── RENDERER ─── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0808);
scene.fog = new THREE.Fog(0xaaaaaa, 80, 200);

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFShadowMap;
renderer.toneMapping = THREE.NoToneMapping;
document.body.appendChild(renderer.domElement);
renderer.domElement.id = 'game-canvas';

const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 500);

scene.add(new THREE.AmbientLight(0xffffff, 0.9));
scene.add(new THREE.HemisphereLight(0x87CEEB, 0x556633, 0.4));

const dirLight = new THREE.DirectionalLight(0xfff5e0, 1.4);
dirLight.position.set(40, 60, 30);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 120;
dirLight.shadow.camera.left = -60;
dirLight.shadow.camera.right = 60;
dirLight.shadow.camera.top = 60;
dirLight.shadow.camera.bottom = -60;
dirLight.shadow.bias = -0.002;
scene.add(dirLight);
scene.add(dirLight.target);

scene.add(camera);

/* ─── COLLISION ─── */
const colliders = [];
let mapMeshes = [];
let floorYData = null;
let useMeshCollision = false;
let proceduralLayouts = [];
const meshRaycaster = new THREE.Raycaster();
const _rayOrigin = new THREE.Vector3();
const _rayDir = new THREE.Vector3(0, -1, 0);
const _v = [new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3()];

function addColliderFromMesh(mesh) {
  if (useMeshCollision) return;
  const bbox = new THREE.Box3().setFromObject(mesh);
  const size = new THREE.Vector3();
  bbox.getSize(size);
  if (size.x < 0.01 || size.y < 0.01 || size.z < 0.01) return;
  colliders.push(bbox);
}

function testCollisionAt(px, pz, r) {
  if (!useMeshCollision) {
    for (const b of colliders) {
      const closestZ = Math.max(b.min.z, Math.min(pz, b.max.z));
      if (Math.abs(pz - closestZ) < r) {
        if (px + r > b.min.x && px - r < b.max.x) return true;
      }
      const closestX = Math.max(b.min.x, Math.min(px, b.max.x));
      if (Math.abs(px - closestX) < r) {
        if (pz + r > b.min.z && pz - r < b.max.z) return true;
      }
    }
    return false;
  }
  const minGx = Math.max(0, Math.floor((px - r - gridOffsetX) / GRID_SIZE));
  const maxGx = Math.min(gridW - 1, Math.floor((px + r - gridOffsetX) / GRID_SIZE));
  const minGz = Math.max(0, Math.floor((pz - r - gridOffsetZ) / GRID_SIZE));
  const maxGz = Math.min(gridH - 1, Math.floor((pz + r - gridOffsetZ) / GRID_SIZE));
  for (let gz = minGz; gz <= maxGz; gz++) {
    for (let gx = minGx; gx <= maxGx; gx++) {
      if (wallGrid[gz * gridW + gx] === 1) return true;
    }
  }
  return false;
}

function testCollisionX(px, pz, r) { return testCollisionAt(px, pz, r); }
function testCollisionZ(px, pz, r) { return testCollisionAt(px, pz, r); }

function getFloorY(px, pz, currentFeetY) {
  if (useMeshCollision && floorYData) {
    const gx = Math.floor((px - gridOffsetX) / GRID_SIZE);
    const gz = Math.floor((pz - gridOffsetZ) / GRID_SIZE);
    if (gx >= 0 && gx < gridW && gz >= 0 && gz < gridH) {
      const floors = floorYData[gz * gridW + gx];
      if (floors && floors.length > 0) {
        const tol = 0.6;
        let best = -999;
        for (let i = 0; i < floors.length; i++) {
          if (floors[i] <= currentFeetY + tol && floors[i] > best) best = floors[i];
        }
        if (best > -999) return best;
        return floors[0];
      }
    }
    return -19.6;
  }
  let maxY = -999;
  for (const b of colliders) {
    if (px >= b.min.x - 0.1 && px <= b.max.x + 0.1 &&
        pz >= b.min.z - 0.1 && pz <= b.max.z + 0.1) {
      if (b.max.y > maxY && b.min.y < maxY + 1) {
        maxY = b.max.y;
      }
    }
  }
  return maxY > -999 ? maxY : 0;
}

/* ─── PLAYER STATE ─── */
const playerPos = new THREE.Vector3(0, EYE, 0);
const playerVel = new THREE.Vector3(0, 0, 0);
let onGround = true;
const euler = new THREE.Euler(0, 0, 0, 'YXZ');
const keys = {};
let locked = false;
let stamina = MAX_STAM;
let sprinting = false;
let headBob = 0;
let shakeAmount = 0;
let floorY = 0;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'ShiftLeft') sprinting = true;
  if (['Space','KeyW','KeyS','KeyA','KeyD'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'ShiftLeft') sprinting = false;
});

renderer.domElement.addEventListener('click', () => {
  if (!locked && gameStarted && !gameOver) renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === renderer.domElement;
});
document.addEventListener('mousemove', e => {
  if (!locked) return;
  euler.y -= e.movementX * 0.002;
  euler.x -= e.movementY * 0.002;
  euler.x = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, euler.x));
  camera.quaternion.setFromEuler(euler);
});

/* ─── PLAYER UPDATE ─── */
let bobTimer = 0;

function updatePlayer(dt) {
  const fwd = new THREE.Vector3();
  camera.getWorldDirection(fwd);
  fwd.y = 0;
  fwd.normalize();
  const right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0, 1, 0)).normalize();

  const move = new THREE.Vector3();
  if (keys['KeyW']) move.add(fwd);
  if (keys['KeyS']) move.sub(fwd);
  if (keys['KeyD']) move.add(right);
  if (keys['KeyA']) move.sub(right);
  if (move.lengthSq() > 0) move.normalize();

  const canSprint = sprinting && stamina > 0 && move.lengthSq() > 0;
  const spd = canSprint ? RUN : WALK;
  if (canSprint) stamina = Math.max(0, stamina - STAM_DRAIN * dt);
  else stamina = Math.min(MAX_STAM, stamina + STAM_REGEN * dt);

  const dx = move.x * spd * dt;
  const dz = move.z * spd * dt;

  if (!testCollisionX(playerPos.x + dx, playerPos.z, PR)) playerPos.x += dx;
  if (!testCollisionZ(playerPos.x, playerPos.z + dz, PR)) playerPos.z += dz;

  if (keys['Space'] && onGround) {
    playerVel.y = JUMP;
    onGround = false;
  }
  playerVel.y += GRAV * dt;
  playerPos.y += playerVel.y * dt;

  const feetY = playerPos.y - EYE;
  const ground = getFloorY(playerPos.x, playerPos.z, feetY);
  if (feetY <= ground + 0.05) {
    playerPos.y = ground + EYE;
    playerVel.y = 0;
    onGround = true;
    floorY = ground;
  }

  if (move.lengthSq() > 0 && onGround) {
    const bobSpeed = canSprint ? 14 : 10;
    headBob += dt * bobSpeed;
    const bobY = Math.sin(headBob) * (canSprint ? 0.06 : 0.03);
    const bobX = Math.cos(headBob * 0.5) * (canSprint ? 0.02 : 0.01);
    camera.position.set(playerPos.x + bobX, playerPos.y + bobY, playerPos.z);
  } else {
    headBob = 0;
    camera.position.set(playerPos.x, playerPos.y, playerPos.z);
  }

  if (shakeAmount > 0) {
    camera.position.x += (Math.random() - 0.5) * shakeAmount;
    camera.position.y += (Math.random() - 0.5) * shakeAmount;
    shakeAmount *= 0.92;
    if (shakeAmount < 0.001) shakeAmount = 0;
  }

  $('stamina-fill').style.width = (stamina / MAX_STAM * 100) + '%';
  $('stamina-fill').style.background = stamina < 25 ? '#ff3030' : '#40ff40';
}

/* ─── GRID FOR PATHFINDING ─── */
let GRID_SIZE = 1.0;
let gridW = 10, gridH = 10;
let gridOffsetX = -5, gridOffsetZ = -5;
let wallGrid = new Uint8Array(100);

function initGrid(minX, minZ, maxX, maxZ) {
  const margin = 2;
  GRID_SIZE = 1.0;
  gridOffsetX = Math.floor((minX - margin) / GRID_SIZE) * GRID_SIZE;
  gridOffsetZ = Math.floor((minZ - margin) / GRID_SIZE) * GRID_SIZE;
  gridW = Math.ceil(((maxX + margin) - gridOffsetX) / GRID_SIZE);
  gridH = Math.ceil(((maxZ + margin) - gridOffsetZ) / GRID_SIZE);
  wallGrid = new Uint8Array(gridW * gridH);
  console.log(`Grid: ${gridW}x${gridH} (${gridW*gridH} cells) covering X[${gridOffsetX.toFixed(1)}..${(gridOffsetX+gridW*GRID_SIZE).toFixed(1)}] Z[${gridOffsetZ.toFixed(1)}..${(gridOffsetZ+gridH*GRID_SIZE).toFixed(1)}]`);
}

function buildWallGridFromMeshes(meshes) {
  wallGrid.fill(0);
  floorYData = new Array(gridW * gridH);
  for (let i = 0; i < floorYData.length; i++) floorYData[i] = [];
  const pr = PR;
  for (const mesh of meshes) {
    const geo = mesh.geometry;
    const pos = geo.attributes.position;
    const idx = geo.index;
    const worldMat = mesh.matrixWorld;
    const triCount = idx ? idx.count / 3 : pos.count / 3;
    for (let t = 0; t < triCount; t++) {
      const ia = idx ? idx.getX(t * 3) : t * 3;
      const ib = idx ? idx.getX(t * 3 + 1) : t * 3 + 1;
      const ic = idx ? idx.getX(t * 3 + 2) : t * 3 + 2;
      _v[0].fromBufferAttribute(pos, ia).applyMatrix4(worldMat);
      _v[1].fromBufferAttribute(pos, ib).applyMatrix4(worldMat);
      _v[2].fromBufferAttribute(pos, ic).applyMatrix4(worldMat);
      const e1x = _v[1].x - _v[0].x, e1y = _v[1].y - _v[0].y, e1z = _v[1].z - _v[0].z;
      const e2x = _v[2].x - _v[0].x, e2y = _v[2].y - _v[0].y, e2z = _v[2].z - _v[0].z;
      const nx = e1y * e2z - e1z * e2y;
      const ny = e1z * e2x - e1x * e2z;
      const nz = e1x * e2y - e1y * e2x;
      const nl = Math.sqrt(nx * nx + ny * ny + nz * nz) || 1;
      const absNY = Math.abs(ny / nl);
      const triMinX = Math.min(_v[0].x, _v[1].x, _v[2].x);
      const triMaxX = Math.max(_v[0].x, _v[1].x, _v[2].x);
      const triMinZ = Math.min(_v[0].z, _v[1].z, _v[2].z);
      const triMaxZ = Math.max(_v[0].z, _v[1].z, _v[2].z);
      const triMaxY = Math.max(_v[0].y, _v[1].y, _v[2].y);
      if (absNY < 0.7) {
        const mgx = Math.max(0, Math.floor((triMinX - gridOffsetX - pr) / GRID_SIZE));
        const xgx = Math.min(gridW - 1, Math.floor((triMaxX - gridOffsetX + pr) / GRID_SIZE));
        const mgz = Math.max(0, Math.floor((triMinZ - gridOffsetZ - pr) / GRID_SIZE));
        const xgz = Math.min(gridH - 1, Math.floor((triMaxZ - gridOffsetZ + pr) / GRID_SIZE));
        for (let gz = mgz; gz <= xgz; gz++) {
          for (let gx = mgx; gx <= xgx; gx++) {
            wallGrid[gz * gridW + gx] = 1;
          }
        }
      }
      if (absNY >= 0.7) {
        const avgY = (_v[0].y + _v[1].y + _v[2].y) / 3;
        const mgx = Math.max(0, Math.floor((triMinX - gridOffsetX) / GRID_SIZE));
        const xgx = Math.min(gridW - 1, Math.floor((triMaxX - gridOffsetX) / GRID_SIZE));
        const mgz = Math.max(0, Math.floor((triMinZ - gridOffsetZ) / GRID_SIZE));
        const xgz = Math.min(gridH - 1, Math.floor((triMaxZ - gridOffsetZ) / GRID_SIZE));
        for (let gz = mgz; gz <= xgz; gz++) {
          for (let gx = mgx; gx <= xgx; gx++) {
            const arr = floorYData[gz * gridW + gx];
            if (arr.length === 0 || Math.abs(arr[arr.length - 1] - avgY) > 0.15) {
              arr.push(avgY);
            }
          }
        }
      }
    }
  }
  for (let i = 0; i < floorYData.length; i++) {
    floorYData[i].sort((a, b) => a - b);
  }
  let wallCount = 0;
  for (let i = 0; i < wallGrid.length; i++) if (wallGrid[i]) wallCount++;
  console.log(`Wall cells: ${wallCount}/${wallGrid.length}`);
}

function buildWallGridFromAABBs() {
  wallGrid.fill(0);
  for (let gz = 0; gz < gridH; gz++) {
    for (let gx = 0; gx < gridW; gx++) {
      const wx = gx * GRID_SIZE + gridOffsetX + GRID_SIZE / 2;
      const wz = gz * GRID_SIZE + gridOffsetZ + GRID_SIZE / 2;
      for (const b of colliders) {
        const hw = (b.max.x - b.min.x) / 2;
        const hd = (b.max.z - b.min.z) / 2;
        const hh = b.max.y - b.min.y;
        if (hh < 0.3 || hw > 30 || hd > 30) continue;
        const cx = (b.min.x + b.max.x) / 2;
        const cz = (b.min.z + b.max.z) / 2;
        const dx = Math.abs(wx - cx);
        const dz = Math.abs(wz - cz);
        if (dx < hw + PR && dz < hd + PR && b.max.y > 0.5) {
          wallGrid[gz * gridW + gx] = 1;
          break;
        }
      }
    }
  }
}

function buildWallGridFromLayouts() {
  wallGrid.fill(0);
  const cellSize = 2.5;
  const gW = 60, gH = 60;
  const halfW = gW / 2, halfH = gH / 2;
  floorYData = new Array(gridW * gridH);
  for (let i = 0; i < floorYData.length; i++) floorYData[i] = [];
  const layout = proceduralLayouts[0];
  if (!layout) return;
  const map = layout.map;
  for (let gz = 0; gz < gridH; gz++) {
    for (let gx = 0; gx < gridW; gx++) {
      const wx = gx * GRID_SIZE + gridOffsetX + GRID_SIZE / 2;
      const wz = gz * GRID_SIZE + gridOffsetZ + GRID_SIZE / 2;
      const lx = Math.round(wx / cellSize + halfW);
      const lz = Math.round(wz / cellSize + halfH);
      if (lx < 0 || lx >= gW || lz < 0 || lz >= gH) continue;
      const idx = gz * gridW + gx;
      if (map[lz][lx] === 1) {
        wallGrid[idx] = 1;
      } else {
        floorYData[idx].push(0);
      }
    }
  }
  for (let i = 0; i < floorYData.length; i++) floorYData[i].sort((a, b) => a - b);
  useMeshCollision = true;
  let wallCount = 0;
  for (let i = 0; i < wallGrid.length; i++) if (wallGrid[i]) wallCount++;
  console.log(`City grid: ${wallCount}/${wallGrid.length} wall cells`);
}

function isGridWall(gx, gz) {
  if (gx < 0 || gx >= gridW || gz < 0 || gz >= gridH) return true;
  return wallGrid[gz * gridW + gx] === 1;
}

function worldToGrid(pos) {
  return {
    x: Math.floor((pos.x - gridOffsetX) / GRID_SIZE),
    z: Math.floor((pos.z - gridOffsetZ) / GRID_SIZE),
  };
}

function gridToWorld(gx, gz) {
  return new THREE.Vector3(gx * GRID_SIZE + gridOffsetX + GRID_SIZE / 2, 0, gz * GRID_SIZE + gridOffsetZ + GRID_SIZE / 2);
}

function bfsPath(sx, sz, gx, gz) {
  if (sx === gx && sz === gz) return [{ x: gx, z: gz }];
  if (isGridWall(gx, gz)) return null;
  if (sx < 0 || sx >= gridW || sz < 0 || sz >= gridH) return null;
  const visited = new Uint8Array(gridW * gridH);
  const parent = new Int32Array(gridW * gridH).fill(-1);
  const queue = [sz * gridW + sx];
  visited[sz * gridW + sx] = 1;
  while (queue.length > 0) {
    const cur = queue.shift();
    const cx = cur % gridW;
    const cz = (cur / gridW) | 0;
    const nbrs = [
      [cx + 1, cz], [cx - 1, cz],
      [cx, cz + 1], [cx, cz - 1]
    ];
    for (const [nx, nz] of nbrs) {
      if (nx === gx && nz === gz) {
        const path = [{ x: nx, z: nz }];
        let p = cur;
        while (p !== sz * gridW + sx) {
          path.unshift({ x: p % gridW, z: (p / gridW) | 0 });
          p = parent[p];
        }
        return path;
      }
      if (nx >= 0 && nx < gridW && nz >= 0 && nz < gridH) {
        const ni = nz * gridW + nx;
        if (!visited[ni] && !isGridWall(nx, nz)) {
          visited[ni] = 1;
          parent[ni] = cur;
          queue.push(ni);
        }
      }
    }
  }
  return null;
}

/* ─── NEXTBOT ─── */
let nextbotSprite, botLight, botLight2;
let botPath = null, botPathIdx = 0, botRecalcTimer = 0, botStuckTimer = 0;
const botLastPos = new THREE.Vector3();
let botActivated = false;

function createNextbot(spawnPos) {
  const nextbotTex = new THREE.TextureLoader().load('mbappe.png');
  nextbotTex.colorSpace = THREE.SRGBColorSpace;
  nextbotSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: nextbotTex }));
  nextbotSprite.scale.set(3.5, 5, 1);
  nextbotSprite.position.copy(spawnPos);
  nextbotSprite.position.y = spawnPos.y + 2.5;
  scene.add(nextbotSprite);

  botLight = new THREE.PointLight(0xff0022, 2, 20);
  botLight.position.copy(nextbotSprite.position);
  botLight.position.y = 4;
  scene.add(botLight);

  botLight2 = new THREE.PointLight(0xff4400, 0.6, 10);
  botLight2.position.copy(nextbotSprite.position);
  botLight2.position.y = 1;
  scene.add(botLight2);

  botLastPos.copy(nextbotSprite.position);
}

function updateBot(dt) {
  const dist = nextbotSprite.position.distanceTo(playerPos);
  if (dist < 45 && !botActivated) botActivated = true;
  if (!botActivated) return;

  const bg = worldToGrid(nextbotSprite.position);
  const pg = worldToGrid(playerPos);

  botRecalcTimer += dt;
  const recalcRate = dist < 12 ? 0.5 : 1.5;
  if (botRecalcTimer >= recalcRate || !botPath) {
    botRecalcTimer = 0;
    const p = bfsPath(bg.x, bg.z, pg.x, pg.z);
    if (p && p.length > 1) { botPath = p; botPathIdx = 1; }
  }

  const stuck = nextbotSprite.position.distanceTo(botLastPos) < 0.05;
  if (stuck) botStuckTimer += dt;
  else botStuckTimer = 0;
  botLastPos.copy(nextbotSprite.position);
  if (botStuckTimer > 2.5) { botPath = null; botStuckTimer = 0; }

  if (botPath && botPathIdx < botPath.length) {
    const tgt = gridToWorld(botPath[botPathIdx].x, botPath[botPathIdx].z);
    tgt.y = nextbotSprite.position.y;
    const dir = new THREE.Vector3().subVectors(tgt, nextbotSprite.position);
    dir.y = 0;
    const d = dir.length();
    if (d < 0.8) {
      botPathIdx++;
    } else {
      dir.normalize();
      const spd = dist < 12 ? BOT_FAST : BOT_BASE;
      const mv = dir.multiplyScalar(spd * dt);
      const br = 0.3;
      const nx = nextbotSprite.position.x + mv.x;
      const nz = nextbotSprite.position.z + mv.z;
      const canX = !testCollisionX(nx, nextbotSprite.position.z, br);
      const canZ = !testCollisionZ(nextbotSprite.position.x, nz, br);
      if (canX) nextbotSprite.position.x = nx;
      if (canZ) nextbotSprite.position.z = nz;
      if (!canX && !canZ) {
        const slideX = !testCollisionX(nx, nextbotSprite.position.z + mv.z * 0.5, br);
        const slideZ = !testCollisionZ(nextbotSprite.position.x + mv.x * 0.5, nz, br);
        if (slideX) nextbotSprite.position.x = nx;
        else if (slideZ) nextbotSprite.position.z = nz;
      }
    }
  } else {
    const dir = new THREE.Vector3().subVectors(playerPos, nextbotSprite.position);
    dir.y = 0;
    if (dir.length() > 1) {
      dir.normalize();
      const spd = dist < 12 ? BOT_FAST : BOT_BASE;
      const mv = dir.multiplyScalar(spd * dt * 0.5);
      const br = 0.3;
      const nx = nextbotSprite.position.x + mv.x;
      const nz = nextbotSprite.position.z + mv.z;
      if (!testCollisionX(nx, nextbotSprite.position.z, br)) nextbotSprite.position.x = nx;
      if (!testCollisionZ(nextbotSprite.position.x, nz, br)) nextbotSprite.position.z = nz;
    }
  }

  const botGround = getFloorY(nextbotSprite.position.x, nextbotSprite.position.z, nextbotSprite.position.y - 2.5);
  nextbotSprite.position.y = botGround + 2.5 + Math.sin(Date.now() * 0.005) * 0.15;

  botLight.position.set(nextbotSprite.position.x, 4, nextbotSprite.position.z);
  botLight2.position.set(nextbotSprite.position.x, 1, nextbotSprite.position.z);
  botLight.intensity = (dist < 8 ? 4 : dist < 20 ? 1.8 : 0.6) + Math.sin(Date.now() * 0.01) * 0.8;

  if (dist < CAP_R) triggerCapture();
}

  musicGain = listener.context.createGain();

  musicSource.start();

}

function updateAudio() {
  if (!musicPlaying || !musicGain) return;
  const dist = nextbotSprite.position.distanceTo(playerPos);
  const raw = Math.max(0, 1 - dist / 35);
  musicGain.gain.setTargetAtTime(Math.min(raw * raw * raw, 0.95), listener.context.currentTime, 0.08);

  if (dist < 14) {
    $('warning').style.display = 'block';
    $('vhs-overlay').style.display = 'block';
    $('warning').style.opacity = String(0.5 + (1 - dist / 14) * 0.5);
  } else {
    $('warning').style.display = 'none';
    $('vhs-overlay').style.display = 'none';

/* ─── MINIMAP ─── */
const mmCanvas = $('minimap-canvas');
const mmCtx = mmCanvas.getContext('2d');
let mmFrame = 0;

function updateMinimap() {
  if (++mmFrame % 6 !== 0) return;
  mmCtx.fillStyle = '#0a0808';
  mmCtx.fillRect(0, 0, 160, 160);
  const mapExtentX = gridW * GRID_SIZE;
  const mapExtentZ = gridH * GRID_SIZE;
  const sc = Math.min(140 / mapExtentX, 140 / mapExtentZ);
  const px = (playerPos.x - gridOffsetX) * sc;
  const pz = (playerPos.z - gridOffsetZ) * sc;
  const ox = 80 - px;
  const oz = 80 - pz;

  mmCtx.fillStyle = '#2a2520';
  const step = Math.max(1, Math.floor(2 / GRID_SIZE));
  for (let gz = 0; gz < gridH; gz += step) {
    for (let gx = 0; gx < gridW; gx += step) {
      if (!isGridWall(gx, gz)) continue;
      const sx = gx * GRID_SIZE * sc + ox;
      const sz = gz * GRID_SIZE * sc + oz;
      if (sx < -5 || sx > 165 || sz < -5 || sz > 165) continue;
      mmCtx.fillRect(sx, sz, Math.max(1, GRID_SIZE * sc * step), Math.max(1, GRID_SIZE * sc * step));
    }
  }

  mmCtx.fillStyle = '#40ff40';
  mmCtx.beginPath();
  mmCtx.arc(80, 80, 2.5, 0, Math.PI * 2);
  mmCtx.fill();

  const bpx = (nextbotSprite.position.x - gridOffsetX) * sc;
  const bpz = (nextbotSprite.position.z - gridOffsetZ) * sc;
  mmCtx.fillStyle = '#ff0040';
  mmCtx.beginPath();
  mmCtx.arc(bpx + ox, bpz + oz, 3, 0, Math.PI * 2);
  mmCtx.fill();

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  mmCtx.strokeStyle = 'rgba(64,255,64,.5)';
  mmCtx.lineWidth = 1;
  mmCtx.beginPath();
  mmCtx.moveTo(80, 80);
  mmCtx.lineTo(80 + dir.x * 10, 80 + dir.z * 10);
  mmCtx.stroke();
}

function findSpawnPos() {
  if (useMeshCollision && floorYData) {
    for (let r = 0; r < 60; r += 2) {
      for (let dx = -r; dx <= r; dx += 2) {
        for (let dz = -r; dz <= r; dz += 2) {
          if (!testCollisionAt(dx, dz, PR)) {
            const feet = getFloorY(dx, dz, -999);
            if (feet > -900) return new THREE.Vector3(dx, feet + EYE, dz);
          }
        }
      }
    }
  }
  for (let r = 0; r < 60; r += 3) {
    for (let dx = -r; dx <= r; dx += 3) {
      for (let dz = -r; dz <= r; dz += 3) {
        if (!testCollisionAt(dx, dz, PR)) {
          return new THREE.Vector3(dx, EYE, dz);
        }
      }
    }
  }
  return new THREE.Vector3(0, EYE, 0);
}

function findBotSpawnPos(playerP) {
  const minDist = 30;
  const maxDist = 50;
  const angle = Math.random() * Math.PI * 2;
  for (let d = minDist; d <= maxDist; d += 3) {
    const tx = playerP.x + Math.cos(angle) * d;
    const tz = playerP.z + Math.sin(angle) * d;
    if (!testCollisionAt(tx, tz, 0.5)) {
      const feet = getFloorY(tx, tz, -999);
      if (feet > -10) return new THREE.Vector3(tx, feet, tz);
    }
  }
  for (let attempt = 0; attempt < 60; attempt++) {
    const a = Math.random() * Math.PI * 2;
    const r = minDist + Math.random() * (maxDist - minDist);
    const tx = playerP.x + Math.cos(a) * r;
    const tz = playerP.z + Math.sin(a) * r;
    if (!testCollisionAt(tx, tz, 0.5)) {
      const feet = getFloorY(tx, tz, -999);
      if (feet > -10) return new THREE.Vector3(tx, feet, tz);
    }
  }
  return new THREE.Vector3(playerP.x + 40, 0, playerP.z);
}

function buildFallbackMap() {

  const GW = 60, GH = 60;
  const halfW = GW / 2, halfH = GH / 2;
  const STREET_W = 2;
  const SIDEWALK_W = 1;
  const BLOCK_SIZE = 12;

  function mulberry32(a) {
    return function() {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  const rng = mulberry32(42);

  function makeTex(w, h, fn) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;

    fn(ctx, w, h);
    const t = new THREE.CanvasTexture(c);
    t.colorSpace = THREE.SRGBColorSpace;
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.magFilter = THREE.LinearFilter;
    return t;
  }

  const asphaltTex = makeTex(128, 128, (ctx, w, h) => {

    }
    for (let i = 0; i < 60; i++) {
      ctx.fillStyle = `rgba(30,30,30,${0.05 + Math.random()*0.1})`;

  const sidewalkTex = makeTex(128, 128, (ctx, w, h) => {
    ctx.fillStyle = '#b0aa9e';
    ctx.fillRect(0, 0, w, h);
    for (let i = 0; i < 500; i++) {
      const v = 155 + Math.random() * 25;
      ctx.fillStyle = `rgb(${v},${v-3},${v-8})`;

    ctx.strokeStyle = 'rgba(90,86,80,0.35)';

    const ts = 32;

    for (let x = 0; x <= w; x += ts) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
    for (let i = 0; i < 8; i++) {
      ctx.fillStyle = `rgba(80,75,65,${0.03 + Math.random()*0.05})`;
      ctx.fillRect(Math.random()*w, Math.random()*h, 4+Math.random()*8, 1);
    }
  });

  const grassTex = makeTex(128, 128, (ctx, w, h) => {
    ctx.fillStyle = '#3a7a28';
    ctx.fillRect(0, 0, w, h);
    for (let i = 0; i < 800; i++) {
      const r = 40 + Math.random() * 30;
      const g = 100 + Math.random() * 55;
      const b = 25 + Math.random() * 20;
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      const blade = Math.random() > 0.7;
      if (blade) {
        ctx.fillRect(Math.random()*w, Math.random()*h, 1, 2+Math.random()*3);
      } else {
        ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
      }
    }
    for (let i = 0; i < 30; i++) {
      ctx.fillStyle = `rgba(25,60,15,${0.1+Math.random()*0.15})`;
      ctx.beginPath();
      ctx.arc(Math.random()*w, Math.random()*h, 2+Math.random()*4, 0, Math.PI*2);
      ctx.fill();
    }
  });

  function makeBrickTex(baseR, baseG, baseB) {
    return makeTex(128, 128, (ctx, w, h) => {
      ctx.fillStyle = `rgb(${baseR},${baseG},${baseB})`;
      ctx.fillRect(0, 0, w, h);
      const bh = 8;
      for (let row = 0; row < h / bh; row++) {

          ctx.fillStyle = `rgb(${baseR+dr},${baseG+dg},${baseB+db})`;

    ctx.fillRect(0, h*0.5, w, h*0.5);
    for (let i = 0; i < 100; i++) {

      ctx.fillStyle = `rgb(${v},${v-2},${v-5})`;
      ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
    }
  });

  const brickColors = [
    [155, 75, 45],
    [130, 65, 50],
    [175, 160, 140],
    [120, 115, 105],
    [145, 80, 65],
    [100, 95, 88],
  ];

  const materials = {
    asphalt: new THREE.MeshLambertMaterial({ map: asphaltTex }),
    sidewalk: new THREE.MeshLambertMaterial({ map: sidewalkTex }),

    roof: new THREE.MeshLambertMaterial({ map: roofTex }),
    pole: new THREE.MeshLambertMaterial({ color: 0x555555 }),
    lampBulb: new THREE.MeshBasicMaterial({ color: 0xfff0c0 }),
    treeTrunk: new THREE.MeshLambertMaterial({ color: 0x5a3a1a }),
    treeLeaves: new THREE.MeshLambertMaterial({ color: 0x2a6e1a }),
    treeLeavesDark: new THREE.MeshLambertMaterial({ color: 0x1e5510 }),
    bench: new THREE.MeshLambertMaterial({ color: 0x6a4a2a }),
    benchMetal: new THREE.MeshLambertMaterial({ color: 0x3a3a3a }),

    fence: new THREE.MeshLambertMaterial({ color: 0x555555 }),
    fountain: new THREE.MeshLambertMaterial({ color: 0x888880 }),
    water: new THREE.MeshLambertMaterial({ color: 0x3388aa, transparent: true, opacity: 0.7 }),
  };

  const buildingMats = brickColors.map(([r, g, b]) =>
    new THREE.MeshLambertMaterial({ map: makeBrickTex(r, g, b) })
  );

  const groundType = [];
  const wallMap = [];
  const buildingHeights = [];
  const buildingMatIdx = [];
  for (let z = 0; z < GH; z++) {
    groundType[z] = [];
    wallMap[z] = [];
    buildingHeights[z] = [];
    buildingMatIdx[z] = [];
    for (let x = 0; x < GW; x++) {
      groundType[z][x] = 'void';
      wallMap[z][x] = 0;
      buildingHeights[z][x] = 0;
      buildingMatIdx[z][x] = 0;
    }
  }

  function isStreet(x, z) {
    for (let s = 0; s < GW; s += BLOCK_SIZE) {
      if (x >= s && x < s + STREET_W) return true;
    }
    for (let s = 0; s < GH; s += BLOCK_SIZE) {
      if (z >= s && z < s + STREET_W) return true;
    }
    return false;
  }

  function isIntersection(x, z) {
    const onStreetX = isStreet(x, 0);
    const onStreetZ = isStreet(0, z);
    return onStreetX && onStreetZ;
  }

  const centerBlockX = Math.floor(GW / 2 / BLOCK_SIZE);
  const centerBlockZ = Math.floor(GH / 2 / BLOCK_SIZE);
  const plazaBlockX = 2;
  const plazaBlockZ = 2;

  for (let z = 0; z < GH; z++) {
    for (let x = 0; x < GW; x++) {
      if (isStreet(x, z)) groundType[z][x] = 'street';
    }
  }

  for (let z = 0; z < GH; z++) {
    for (let x = 0; x < GW; x++) {
      if (groundType[z][x] !== 'street') continue;
      for (let dx = -1; dx <= 1; dx++) {
        for (let dz = -1; dz <= 1; dz++) {
          const nx = x + dx, nz = z + dz;
          if (nx >= 0 && nx < GW && nz >= 0 && nz < GH && groundType[nz][nx] !== 'street') {
            groundType[nz][nx] = 'sidewalk';
          }
        }
      }
    }
  }

  for (let z = 0; z < GH; z++) {
    for (let x = 0; x < GW; x++) {
      if (groundType[z][x] === 'void') groundType[z][x] = 'sidewalk';
    }
  }

  for (let bz = 0; bz < Math.floor(GH / BLOCK_SIZE); bz++) {
    for (let bx = 0; bx < Math.floor(GW / BLOCK_SIZE); bx++) {
      const isPlaza = bx === plazaBlockX && bz === plazaBlockZ;

      if (isPlaza) {
        const startX = bx * BLOCK_SIZE + STREET_W + SIDEWALK_W;
        const endX = Math.min((bx + 1) * BLOCK_SIZE - SIDEWALK_W, GW);
        const startZ = bz * BLOCK_SIZE + STREET_W + SIDEWALK_W;
        const endZ = Math.min((bz + 1) * BLOCK_SIZE - SIDEWALK_W, GH);
        for (let z = startZ; z < endZ; z++) {
          for (let x = startX; x < endX; x++) {
            if (x >= 0 && x < GW && z >= 0 && z < GH) groundType[z][x] = 'grass';
          }
        }
        continue;
      }

      const blockStartX = bx * BLOCK_SIZE + STREET_W + SIDEWALK_W;
      const blockEndX = Math.min((bx + 1) * BLOCK_SIZE - SIDEWALK_W, GW);
      const blockStartZ = bz * BLOCK_SIZE + STREET_W + SIDEWALK_W;
      const blockEndZ = Math.min((bz + 1) * BLOCK_SIZE - SIDEWALK_W, GH);
      const blockW = blockEndX - blockStartX;
      const blockH = blockEndZ - blockStartZ;
      if (blockW < 4 || blockH < 4) continue;

      const numBuildings = 1 + Math.floor(rng() * 2);
      const placed = [];
      for (let b = 0; b < numBuildings; b++) {
        const bw = 3 + Math.floor(rng() * Math.min(5, blockW - 2));
        const bh = 3 + Math.floor(rng() * Math.min(5, blockH - 2));
        const bx0 = blockStartX + Math.floor(rng() * Math.max(1, blockW - bw));
        const bz0 = blockStartZ + Math.floor(rng() * Math.max(1, blockH - bh));
        const bhHeight = 2 + Math.floor(rng() * 6);
        const matI = Math.floor(rng() * buildingMats.length);

        let overlap = false;
        for (const p of placed) {
          if (bx0 < p.x + p.w && bx0 + bw > p.x && bz0 < p.z + p.h && bz0 + bh > p.z) { overlap = true; break; }
        }
        if (overlap) continue;
        placed.push({ x: bx0, z: bz0, w: bw, h: bh });

        for (let z = bz0; z < bz0 + bh && z < GH; z++) {
          for (let x = bx0; x < bx0 + bw && x < GW; x++) {
            groundType[z][x] = 'floor';
            buildingHeights[z][x] = bhHeight;
            buildingMatIdx[z][x] = matI;
          }
        }

        if (bw >= 5 && bh >= 5 && rng() > 0.3) {
          const alleyDir = rng() > 0.5;
          if (alleyDir) {
            const ax = bx0 + Math.floor(bw / 2);
            for (let z = bz0; z < bz0 + bh && z < GH; z++) {
              if (ax >= 0 && ax < GW) { groundType[z][ax] = 'sidewalk'; buildingHeights[z][ax] = 0; }
            }
          } else {
            const az = bz0 + Math.floor(bh / 2);
            for (let x = bx0; x < bx0 + bw && x < GW; x++) {
              if (az >= 0 && az < GH) { groundType[az][x] = 'sidewalk'; buildingHeights[az][x] = 0; }
            }
          }
        }
      }

      for (let z = blockStartZ; z < blockEndZ; z++) {
        for (let x = blockStartX; x < blockEndX; x++) {
          if (x >= 0 && x < GW && z >= 0 && z < GH && groundType[z][x] === 'void') {
            groundType[z][x] = 'sidewalk';
          }
        }
      }
    }
  }

  for (let z = 0; z < GH; z++) {
    for (let x = 0; x < GW; x++) {
      if (groundType[z][x] === 'void') groundType[z][x] = 'sidewalk';
    }
  }

  for (let z = 0; z < GH; z++) {
    for (let x = 0; x < GW; x++) {
      if (groundType[z][x] === 'floor' && buildingHeights[z][x] > 0) wallMap[z][x] = 1;
    }
  }

  for (let x = 0; x < GW; x++) { wallMap[0][x] = 1; wallMap[GH - 1][x] = 1; }
  for (let z = 0; z < GH; z++) { wallMap[z][0] = 1; wallMap[z][GW - 1] = 1; }

  const geoByMaterial = new Map();
  function collectBox(mat, x, y, z, sx, sy, sz) {
    if (!geoByMaterial.has(mat)) geoByMaterial.set(mat, []);
    const g = new THREE.BoxGeometry(sx, sy, sz);
    g.translate(x, y + sy / 2, z);
    geoByMaterial.get(mat).push(g);
  }

  function markPropWall(wx, wz) {
    const gx = Math.round(wx / C + halfW);
    const gz = Math.round(wz / C + halfH);
    if (gx >= 0 && gx < GW && gz >= 0 && gz < GH) wallMap[gz][gx] = 1;
  }

  function collectCylinder(mat, x, y, z, rTop, rBot, h, segs) {
    if (!geoByMaterial.has(mat)) geoByMaterial.set(mat, []);
    const g = new THREE.CylinderGeometry(rTop, rBot, h, segs || 8);
    g.translate(x, y + h / 2, z);
    geoByMaterial.get(mat).push(g);
  }

  function collectCone(mat, x, y, z, r, h, segs) {
    if (!geoByMaterial.has(mat)) geoByMaterial.set(mat, []);
    const g = new THREE.ConeGeometry(r, h, segs || 8);
    g.translate(x, y + h / 2, z);
    geoByMaterial.get(mat).push(g);
  }

  for (let z = 0; z < GH; z++) {
    for (let x = 0; x < GW; x++) {
      const wx = (x - halfW) * C;
      const wz = (z - halfH) * C;
      const gt = groundType[z][x];

      if (gt === 'street') {
        collectBox(materials.asphalt, wx, -0.05, wz, C, 0.1, C);
      } else if (gt === 'sidewalk') {
        collectBox(materials.sidewalk, wx, 0.0, wz, C, 0.15, C);
      } else if (gt === 'grass') {
        collectBox(materials.grass, wx, -0.1, wz, C, 0.2, C);
      } else if (gt === 'floor') {
        const h = buildingHeights[z][x];
        if (h > 0 && wallMap[z][x] === 1) {
          const mat = buildingMats[buildingMatIdx[z][x]];
          collectBox(mat, wx, 0, wz, C, h * 1.2, C);
        }
      }
    }
  }

  for (let z = 0; z < GH; z++) {
    for (let x = 0; x < GW; x++) {
      if (wallMap[z][x] !== 1) continue;
      const h = buildingHeights[z][x];
      if (h <= 0) continue;
      const wx = (x - halfW) * C;
      const wz = (z - halfH) * C;
      const wallH = h * 1.2;
      const mat = buildingMats[buildingMatIdx[z][x]];

      const n = (z > 0 && wallMap[z-1][x] !== 1);
      const s = (z < GH-1 && wallMap[z+1][x] !== 1);
      const w = (x > 0 && wallMap[z][x-1] !== 1);
      const e = (x < GW-1 && wallMap[z][x+1] !== 1);

      if (n) collectBox(mat, wx, 0, wz - C/2, C + 0.1, wallH, 0.2);
      if (s) collectBox(mat, wx, 0, wz + C/2, C + 0.1, wallH, 0.2);
      if (w) collectBox(mat, wx - C/2, 0, wz, 0.2, wallH, C + 0.1);
      if (e) collectBox(mat, wx + C/2, 0, wz, 0.2, wallH, C + 0.1);
    }
  }

  for (let z = 0; z < GH; z++) {
    for (let x = 0; x < GW; x++) {
      if (wallMap[z][x] !== 1) continue;
      const h = buildingHeights[z][x];
      if (h <= 0) continue;
      const wx = (x - halfW) * C;
      const wz = (z - halfH) * C;
      collectBox(materials.roof, wx, h * 1.2, wz, C + 0.1, 0.15, C + 0.1);

      if (h >= 5 && rng() > 0.6) {
        const ox = (rng() - 0.5) * C * 0.4;
        const oz = (rng() - 0.5) * C * 0.4;
        collectBox(materials.concrete, wx + ox, h * 1.2 + 0.15, wz + oz, 1.0, 0.6, 0.6);
      }
    }
  }

  for (let z = 0; z < GH; z++) {
    for (let x = 0; x < GW; x++) {
      const isEdgeX = (x === 0 || x === GW - 1);
      const isEdgeZ = (z === 0 || z === GH - 1);
      if (!isEdgeX && !isEdgeZ) continue;
      const wx = (x - halfW) * C;
      const wz = (z - halfH) * C;
      if (isEdgeX && isEdgeZ) {
        collectBox(materials.concrete, wx, 0, wz, 0.4, 6, 0.4);
      } else if (isEdgeX) {
        collectBox(materials.concrete, wx, 0, wz, 0.4, 6, C + 0.1);
      } else {
        collectBox(materials.concrete, wx, 0, wz, C + 0.1, 6, 0.4);
      }
    }
  }

  const streetLights = [];
  for (let z = 0; z < GH; z += BLOCK_SIZE * 3) {
    for (let x = 0; x < GW; x += BLOCK_SIZE * 3) {
      for (let corner = 0; corner < 2; corner++) {
        const lx = x + (corner % 2 === 0 ? 0 : STREET_W - 1);
        const lz = z + (corner < 1 ? 0 : STREET_W - 1);
        if (lx < 0 || lx >= GW || lz < 0 || lz >= GH) continue;

        let sx = lx, sz = lz;
        if (groundType[sz][sx] !== 'street') {
          for (let dx = -1; dx <= 1; dx++) {
            for (let dz = -1; dz <= 1; dz++) {
              const nx = lx + dx, nz = lz + dz;
              if (nx >= 0 && nx < GW && nz >= 0 && nz < GH && groundType[nz][nx] === 'street') {
                sx = nx; sz = nz; break;
              }
            }
            if (groundType[sz][sx] === 'street') break;
          }
        }
        if (groundType[sz][sx] !== 'street') continue;

        const wx = (sx - halfW) * C;
        const wz = (sz - halfH) * C;
        if (streetLights.some(l => Math.abs(l.x - wx) < C * 2 && Math.abs(l.z - wz) < C * 2)) continue;

        collectCylinder(materials.pole, wx, 0, wz, 0.06, 0.08, 5.5, 8);
        collectBox(materials.pole, wx, 5.0, wz, 0.08, 0.08, 2.0);
        collectBox(materials.lampBulb, wx, 4.8, wz + 0.8, 0.3, 0.15, 0.3);

        streetLights.push({ x: wx, z: wz + 0.8 });
      }
    }
  }

  for (let z = 0; z < GH; z++) {
    for (let x = 0; x < GW; x++) {
      if (!isIntersection(x, z)) continue;
      const wx = (x - halfW) * C;
      const wz = (z - halfH) * C;
      collectBox(materials.crosswalk, wx, 0.02, wz, C * 0.8, 0.02, C * 0.15);
      collectBox(materials.crosswalk, wx, 0.02, wz, C * 0.15, 0.02, C * 0.8);
    }
  }

  const treePositions = [];
  for (let z = 0; z < GH; z++) {
    for (let x = 0; x < GW; x++) {
      if (groundType[z][x] !== 'sidewalk') continue;
      if (rng() > 0.96) {
        let nearStreet = false;
        for (const [dx, dz] of [[1,0],[-1,0],[0,1],[0,-1]]) {
          const nx = x + dx, nz = z + dz;
          if (nx >= 0 && nx < GW && nz >= 0 && nz < GH && groundType[nz][nx] === 'street') {
            nearStreet = true; break;
          }
        }
        if (!nearStreet) continue;

        const wx = (x - halfW) * C + (rng() - 0.5) * 0.5;
        const wz = (z - halfH) * C + (rng() - 0.5) * 0.5;
        if (treePositions.some(t => Math.abs(t.x - wx) < C * 2 && Math.abs(t.z - wz) < C * 2)) continue;
        treePositions.push({ x: wx, z: wz });

        const trunkH = 2.5 + rng() * 1.5;
        collectCylinder(materials.treeTrunk, wx, 0.15, wz, 0.12, 0.18, trunkH, 6);

        const leafMat = rng() > 0.5 ? materials.treeLeaves : materials.treeLeavesDark;
        const crownR = 1.2 + rng() * 0.8;
        const crownH = 1.8 + rng() * 1.0;
        collectCone(leafMat, wx, trunkH * 0.6, wz, crownR, crownH, 6);
        collectCone(leafMat, wx, trunkH * 0.6 + crownH * 0.4, wz, crownR * 0.7, crownH * 0.7, 6);
      }
    }
  }

  for (let z = 0; z < GH; z++) {
    for (let x = 0; x < GW; x++) {
      if (groundType[z][x] !== 'grass') continue;
      const wx = (x - halfW) * C;
      const wz = (z - halfH) * C;

      if (rng() > 0.5) {
        const trunkH = 2.0 + rng() * 1.0;
        collectCylinder(materials.treeTrunk, wx, 0.1, wz, 0.1, 0.15, trunkH, 6);
        const leafMat = rng() > 0.5 ? materials.treeLeaves : materials.treeLeavesDark;
        const crownR = 1.0 + rng() * 0.6;
        collectCone(leafMat, wx, trunkH * 0.5, wz, crownR, 1.6, 6);
        collectCone(leafMat, wx, trunkH * 0.5 + 1.0, wz, crownR * 0.65, 1.2, 6);
      }
    }
  }

  for (let z = 0; z < GH; z++) {
    for (let x = 0; x < GW; x++) {
      if (groundType[z][x] !== 'sidewalk') continue;
      let facingStreet = -1;
      for (const [dx, dz, dir] of [[1,0,0],[-1,0,1],[0,1,2],[0,-1,3]]) {
        const nx = x + dx, nz = z + dz;
        if (nx >= 0 && nx < GW && nz >= 0 && nz < GH && groundType[nz][nx] === 'street') {
          facingStreet = dir; break;
        }
      }
      if (facingStreet < 0) continue;
      if (rng() > 0.92) {
        const wx = (x - halfW) * C;
        const wz = (z - halfH) * C;
        if (facingStreet === 0 || facingStreet === 1) {
          const seatW = 1.2, seatD = 0.4, legH = 0.38, seatThick = 0.06, legW = 0.06;
          collectBox(materials.bench, wx, legH, wz, seatW, seatThick, seatD);
          collectBox(materials.benchMetal, wx - seatW/2 + legW, 0, wz, legW, legH, seatD * 0.8);
          collectBox(materials.benchMetal, wx + seatW/2 - legW, 0, wz, legW, legH, seatD * 0.8);
          collectBox(materials.benchMetal, wx, legH + 0.02, wz - seatD/2 + 0.02, seatW * 0.9, 0.32, 0.04);
        } else {
          const seatW = 0.4, seatD = 1.2, legH = 0.38, seatThick = 0.06, legW = 0.06;
          collectBox(materials.bench, wx, legH, wz, seatW, seatThick, seatD);
          collectBox(materials.benchMetal, wx, 0, wz - seatD/2 + legW, seatW * 0.8, legH, legW);
          collectBox(materials.benchMetal, wx, 0, wz + seatD/2 - legW, seatW * 0.8, legH, legW);
          collectBox(materials.benchMetal, wx, legH + 0.02, wz + seatD/2 - 0.02, 0.04, 0.32, seatD * 0.9);
        }
      }
      if (rng() > 0.95) {
        const wx = (x - halfW) * C + (rng() - 0.5) * 0.6;
        const wz = (z - halfH) * C + (rng() - 0.5) * 0.6;
        collectCylinder(materials.trashcan, wx, 0.15, wz, 0.2, 0.22, 0.7, 8);
      }
    }
  }

  const pcx = (plazaBlockX * BLOCK_SIZE + BLOCK_SIZE / 2 - halfW) * C;
  const pcz = (plazaBlockZ * BLOCK_SIZE + BLOCK_SIZE / 2 - halfH) * C;
  collectCylinder(materials.fountain, pcx, 0.2, pcz, 2.5, 3.0, 0.8, 16);
  collectCylinder(materials.fountain, pcx, 0.8, pcz, 1.8, 2.0, 0.5, 16);
  collectCylinder(materials.water, pcx, 0.9, pcz, 1.7, 1.7, 0.3, 16);
  collectCylinder(materials.fountain, pcx, 1.2, pcz, 0.3, 0.4, 1.0, 8);
  markPropWall(pcx, pcz);

  for (const [mat, geos] of geoByMaterial) {
    if (geos.length === 0) continue;
    const merged = mergeGeometries(geos, false);
    if (!merged) continue;
    const m = new THREE.Mesh(merged, mat);
    scene.add(m);
    mapMeshes.push(m);
    for (const g of geos) g.dispose();
  }

  for (const sl of streetLights) {
    const pl = new THREE.PointLight(0xfff0d0, 0.6, 18, 2);
    pl.position.set(sl.x, 4.6, sl.z);
    scene.add(pl);
  }

  proceduralLayouts = [{
    map: wallMap,
    groundType: groundType,
    buildingHeights: buildingHeights,
  }];

  for (let i = colliders.length - 1; i >= 0; i--) {
    const b = colliders[i];
    if (b.max.y - b.min.y < 0.3 || (b.max.x - b.min.x) > 30 || (b.max.z - b.min.z) > 30) colliders.splice(i, 1);
  }

  scene.background = new THREE.Color(0x7ec8e3);
  scene.fog = new THREE.Fog(0x7ec8e3, 50, 130);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
