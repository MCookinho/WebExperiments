<style>
*{margin:0;padding:0;box-sizing:border-box}

canvas#game-canvas{display:block}

#overlay .controls-info span{color:#ff0040;font-weight:bold}
#start-btn{margin-top:2rem;padding:1rem 3rem;font-size:1.3rem;font-family:'Courier New',monospace;font-weight:700;background:#ff0040;color:#fff;border:none;border-radius:2px;cursor:pointer;text-transform:uppercase;letter-spacing:4px;transition:all .3s}

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* ─── CONSTANTS ─── */
const PR = 0.35;
const EYE = 1.7;
const GRAV = -28;
const JUMP = 9.5;
const WALK = 6;
const RUN = 10.5;
const BOT_BASE = 7;
const BOT_FAST = 12;
const CAP_R = 1.8;
const MAX_STAM = 100;
const STAM_DRAIN = 28;
const STAM_REGEN = 10;

/* ─── RENDERER ─── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0808);
scene.fog = new THREE.Fog(0x0a0808, 15, 65);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
document.body.appendChild(renderer.domElement);
renderer.domElement.id = 'game-canvas';

const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 200);

/* ─── LIGHTING ─── */
scene.add(new THREE.AmbientLight(0xffe8cc, 0.15));
scene.add(new THREE.HemisphereLight(0xffeedd, 0x221100, 0.2));

const flashlight = new THREE.SpotLight(0xffeedd, 3, 20, Math.PI / 5, 0.4, 1.5);
flashlight.castShadow = true;
flashlight.shadow.mapSize.set(1024, 1024);
flashlight.shadow.bias = -0.002;
camera.add(flashlight);
flashlight.position.set(0, -0.3, -0.5);
flashlight.target.position.set(0, -0.3, -5);
camera.add(flashlight.target);
scene.add(camera);

/* ─── COLLISION ─── */
const colliders = [];

function addColliderFromMesh(mesh) {
  const geo = mesh.geometry;
  const posAttr = geo.getAttribute('position');
  if (!posAttr) return;

  const bbox = new THREE.Box3().setFromObject(mesh);
  const size = new THREE.Vector3();
  bbox.getSize(size);

  if (size.x < 0.01 || size.y < 0.01 || size.z < 0.01) return;
  if (size.x > 50 || size.y > 50 || size.z > 50) return;

  colliders.push(bbox);
}

function addColliderFromBox3(box) {
  colliders.push(box.clone());
}

function testCollisionX(px, pz, r) {
  for (const b of colliders) {
    const closestZ = Math.max(b.min.z, Math.min(pz, b.max.z));
    const dz = Math.abs(pz - closestZ);
    if (dz >= r) continue;
    if (px + r > b.min.x && px - r < b.max.x) return true;
  }
  return false;
}

function testCollisionZ(px, pz, r) {
  for (const b of colliders) {
    const closestX = Math.max(b.min.x, Math.min(px, b.max.x));
    const dx = Math.abs(px - closestX);
    if (dx >= r) continue;
    if (pz + r > b.min.z && pz - r < b.max.z) return true;
  }
  return false;
}

function getFloorY(px, pz) {
  let maxY = 0;
  for (const b of colliders) {
    if (px >= b.min.x - 0.1 && px <= b.max.x + 0.1 &&
        pz >= b.min.z - 0.1 && pz <= b.max.z + 0.1) {
      if (b.min.y <= maxY + 0.1 && b.max.y > maxY) {
        maxY = b.max.y;
      }
    }
  }
  return maxY;
}

/* ─── PLAYER STATE ─── */
const playerPos = new THREE.Vector3(0, EYE, 0);
const playerVel = new THREE.Vector3(0, 0, 0);
let onGround = true;
const euler = new THREE.Euler(0, 0, 0, 'YXZ');
const keys = {};
let locked = false;
let stamina = MAX_STAM;
let sprinting = false;
let headBob = 0;
let shakeAmount = 0;
let floorY = 0;

/* ─── INPUT ─── */
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'ShiftLeft') sprinting = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'ShiftLeft') sprinting = false;
});

renderer.domElement.addEventListener('click', () => {
  if (!locked && gameStarted && !gameOver) renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === renderer.domElement;
});
document.addEventListener('mousemove', e => {
  if (!locked) return;
  euler.y -= e.movementX * 0.002;
  euler.x -= e.movementY * 0.002;
  euler.x = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, euler.x));
  camera.quaternion.setFromEuler(euler);
});

/* ─── PLAYER UPDATE ─── */
let bobTimer = 0;

function updatePlayer(dt) {
  const fwd = new THREE.Vector3();
  camera.getWorldDirection(fwd);
  fwd.y = 0;
  fwd.normalize();
  const right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0, 1, 0)).normalize();

  const move = new THREE.Vector3();
  if (keys['KeyW']) move.add(fwd);
  if (keys['KeyS']) move.sub(fwd);
  if (keys['KeyD']) move.add(right);
  if (keys['KeyA']) move.sub(right);
  if (move.lengthSq() > 0) move.normalize();

  const canSprint = sprinting && stamina > 0 && move.lengthSq() > 0;
  const spd = canSprint ? RUN : WALK;
  if (canSprint) stamina = Math.max(0, stamina - STAM_DRAIN * dt);
  else stamina = Math.min(MAX_STAM, stamina + STAM_REGEN * dt);

  const dx = move.x * spd * dt;
  const dz = move.z * spd * dt;

  if (!testCollisionX(playerPos.x + dx, playerPos.z, PR)) playerPos.x += dx;
  if (!testCollisionZ(playerPos.x, playerPos.z + dz, PR)) playerPos.z += dz;

  if (keys['Space'] && onGround) {
    playerVel.y = JUMP;
    onGround = false;
  }
  playerVel.y += GRAV * dt;
  playerPos.y += playerVel.y * dt;

  const feetY = playerPos.y - EYE;
  const ground = getFloorY(playerPos.x, playerPos.z);
  if (feetY <= ground) {
    playerPos.y = ground + EYE;
    playerVel.y = 0;
    onGround = true;
    floorY = ground;
  }

  if (move.lengthSq() > 0 && onGround) {
    const bobSpeed = canSprint ? 14 : 10;
    headBob += dt * bobSpeed;
    const bobY = Math.sin(headBob) * (canSprint ? 0.06 : 0.03);
    const bobX = Math.cos(headBob * 0.5) * (canSprint ? 0.02 : 0.01);
    camera.position.set(playerPos.x + bobX, playerPos.y + bobY, playerPos.z);
  } else {
    headBob = 0;
    camera.position.set(playerPos.x, playerPos.y, playerPos.z);
  }

  if (shakeAmount > 0) {
    camera.position.x += (Math.random() - 0.5) * shakeAmount;
    camera.position.y += (Math.random() - 0.5) * shakeAmount;
    shakeAmount *= 0.92;
    if (shakeAmount < 0.001) shakeAmount = 0;
  }

  document.getElementById('stamina-fill').style.width = (stamina / MAX_STAM * 100) + '%';
  document.getElementById('stamina-fill').style.background = stamina < 25 ? '#ff3030' : '#40ff40';
}

/* ─── GRID FOR PATHFINDING ─── */
const GRID_SIZE = 2;
const gridW = 200;
const gridH = 200;
const gridOffsetX = -gridW * GRID_SIZE / 2;
const gridOffsetZ = -gridH * GRID_SIZE / 2;
const wallGrid = new Uint8Array(gridW * gridH);

function buildWallGrid() {
  wallGrid.fill(0);
  for (let gz = 0; gz < gridH; gz++) {
    for (let gx = 0; gx < gridW; gx++) {
      const wx = gx * GRID_SIZE + gridOffsetX + GRID_SIZE / 2;
      const wz = gz * GRID_SIZE + gridOffsetZ + GRID_SIZE / 2;

      for (const b of colliders) {
        const hw = (b.max.x - b.min.x) / 2;
        const hd = (b.max.z - b.min.z) / 2;
        const hh = b.max.y - b.min.y;

        if (hh < 0.5 || hh > 20) continue;
        if (hw > 15 || hd > 15) continue;

        const cx = (b.min.x + b.max.x) / 2;
        const cz = (b.min.z + b.max.z) / 2;

        const dx = Math.abs(wx - cx);
        const dz = Math.abs(wz - cz);

        if (dx < hw + PR && dz < hd + PR && b.max.y > 0.5) {
          wallGrid[gz * gridW + gx] = 1;
          break;
        }
      }
    }
  }
}

function isGridWall(gx, gz) {
  if (gx < 0 || gx >= gridW || gz < 0 || gz >= gridH) return true;
  return wallGrid[gz * gridW + gx] === 1;
}

function worldToGrid(pos) {
  return {
    x: Math.floor((pos.x - gridOffsetX) / GRID_SIZE),
    z: Math.floor((pos.z - gridOffsetZ) / GRID_SIZE),
  };
}

function gridToWorld(gx, gz) {
  return new THREE.Vector3(
    gx * GRID_SIZE + gridOffsetX + GRID_SIZE / 2,
    0,
    gz * GRID_SIZE + gridOffsetZ + GRID_SIZE / 2
  );
}

/* ─── BFS PATHFINDING ─── */
function bfsPath(sx, sz, gx, gz) {
  if (sx === gx && sz === gz) return [{ x: gx, z: gz }];
  if (isGridWall(gx, gz)) return null;
  if (sx < 0 || sx >= gridW || sz < 0 || sz >= gridH) return null;

  const visited = new Uint8Array(gridW * gridH);
  const parent = new Int32Array(gridW * gridH).fill(-1);
  const queue = [sz * gridW + sx];
  visited[sz * gridW + sx] = 1;

  const dirs = [1, -1, gridW, -gridW];

  while (queue.length > 0) {
    const cur = queue.shift();
    const cx = cur % gridW;
    const cz = Math.floor(cur / gridW);

    for (let i = 0; i < 4; i++) {
      const nx = cx + (i < 2 ? (i === 0 ? 1 : -1) : 0);
      const nz = cz + (i >= 2 ? (i === 2 ? 1 : -1) : 0);
      const ni = nz * gridW + nx;

      if (nx === gx && nz === gz) {
        const path = [{ x: nx, z: nz }];
        let p = cur;
        while (p !== sz * gridW + sx) {
          path.unshift({ x: p % gridW, z: Math.floor(p / gridW) });
          p = parent[p];
        }
        return path;
      }

      if (nx >= 0 && nx < gridW && nz >= 0 && nz < gridH &&
          !visited[ni] && !isGridWall(nx, nz)) {
        visited[ni] = 1;
        parent[ni] = cur;
        queue.push(ni);
      }
    }
  }
  return null;
}

/* ─── LOAD MAP ─── */
document.getElementById('loading').style.display = 'flex';

const gltfLoader = new GLTFLoader();
const gltf = await gltfLoader.loadAsync('backroom.glb');
const mapRoot = gltf.scene;

mapRoot.traverse((child) => {
  if (child.isMesh) {
    child.castShadow = true;
    child.receiveShadow = true;

    if (child.material) {
      if (Array.isArray(child.material)) {
        child.material.forEach(m => {
          m.side = THREE.DoubleSide;
          if (m.map) m.map.colorSpace = THREE.SRGBColorSpace;
        });
      } else {
        child.material.side = THREE.DoubleSide;
        if (child.material.map) child.material.map.colorSpace = THREE.SRGBColorSpace;
      }
    }
    addColliderFromMesh(child);
  }
});

scene.add(mapRoot);

const mapBBox = new THREE.Box3().setFromObject(mapRoot);
const mapCenter = new THREE.Vector3();
mapBBox.getCenter(mapCenter);
const mapSize = new THREE.Vector3();
mapBBox.getSize(mapSize);

console.log('Map bounds:', mapBBox.min.toArray(), mapBBox.max.toArray());
console.log('Map size:', mapSize.toArray());
console.log('Colliders:', colliders.length);

/* ─── PLACE LIGHTS IN MAP ─── */
const existingLights = [];
mapRoot.traverse((child) => {
  if (child.isLight) existingLights.push(child);
});

if (existingLights.length < 5) {
  const step = 8;
  for (let x = mapBBox.min.x + 4; x < mapBBox.max.x; x += step) {
    for (let z = mapBBox.min.z + 4; z < mapBBox.max.z; z += step) {
      if (!testCollisionX(x, z, 0.1) && !testCollisionZ(x, z, 0.1)) {
        const pl = new THREE.PointLight(0xffddaa, 0.5, 12, 1.5);
        pl.position.set(x, 3.5, z);
        scene.add(pl);
      }
    }
  }
}

/* ─── GRID-BASED PATHFINDING WALL DETECTION ─── */
buildWallGrid();

let openCount = 0;
for (let i = 0; i < wallGrid.length; i++) if (wallGrid[i] === 0) openCount++;
console.log('Open grid cells:', openCount, '/', gridW * gridH);

/* ─── FIND SPAWN ─── */
function findSpawnPos() {
  const cx = mapCenter.x;
  const cz = mapCenter.z;
  for (let r = 0; r < 30; r += 2) {
    for (let dx = -r; dx <= r; dx += 2) {
      for (let dz = -r; dz <= r; dz += 2) {
        const x = cx + dx;
        const z = cz + dz;
        if (!testCollisionX(x, z, PR) && !testCollisionZ(x, z, PR)) {
          return new THREE.Vector3(x, EYE, z);
        }
      }
    }
  }
  return new THREE.Vector3(cx, EYE, cz);
}

function findBotSpawnPos() {
  let best = null;
  let bestDist = 0;
  for (let x = mapBBox.min.x + 2; x < mapBBox.max.x - 2; x += 3) {
    for (let z = mapBBox.min.z + 2; z < mapBBox.max.z - 2; z += 3) {
      if (!testCollisionX(x, z, 0.5) && !testCollisionZ(x, z, 0.5)) {
        const dx = x - playerPos.x;
        const dz = z - playerPos.z;
        const d = dx * dx + dz * dz;
        if (d > bestDist) { bestDist = d; best = new THREE.Vector3(x, 0, z); }
      }
    }
  }
  return best || new THREE.Vector3(cx + 10, 0, cz + 10);
}

playerPos.copy(findSpawnPos());
const botSpawnPos = findBotSpawnPos();

console.log('Player spawn:', playerPos.toArray());
console.log('Bot spawn:', botSpawnPos.toArray());

/* ─── NEXTBOT ─── */
const nextbotTex = new THREE.TextureLoader().load('mbappe.png');
nextbotTex.colorSpace = THREE.SRGBColorSpace;
const nextbotSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: nextbotTex }));
nextbotSprite.scale.set(3.5, 5, 1);
nextbotSprite.position.copy(botSpawnPos);
nextbotSprite.position.y = 2.5;
scene.add(nextbotSprite);

const botLight = new THREE.PointLight(0xff0022, 2, 20);
botLight.position.copy(nextbotSprite.position);
botLight.position.y = 4;
scene.add(botLight);

const botLight2 = new THREE.PointLight(0xff4400, 0.6, 10);
botLight2.position.copy(nextbotSprite.position);
botLight2.position.y = 1;
scene.add(botLight2);

let botPath = null;
let botPathIdx = 0;
let botRecalcTimer = 0;
let botStuckTimer = 0;
const botLastPos = new THREE.Vector3().copy(nextbotSprite.position);
let botActivated = false;
const BOT_ACTIVATION_DIST = 45;

function updateBot(dt) {
  const dist = nextbotSprite.position.distanceTo(playerPos);

  if (dist < BOT_ACTIVATION_DIST && !botActivated) botActivated = true;
  if (!botActivated) return;

  const bg = worldToGrid(nextbotSprite.position);
  const pg = worldToGrid(playerPos);

  botRecalcTimer += dt;
  const recalcRate = dist < 12 ? 0.2 : 0.5;
  if (botRecalcTimer >= recalcRate || !botPath) {
    botRecalcTimer = 0;
    const p = bfsPath(bg.x, bg.z, pg.x, pg.z);
    if (p && p.length > 1) { botPath = p; botPathIdx = 1; }
  }

  const stuck = nextbotSprite.position.distanceTo(botLastPos) < 0.05;
  if (stuck) botStuckTimer += dt;
  else botStuckTimer = 0;
  botLastPos.copy(nextbotSprite.position);
  if (botStuckTimer > 2.5) { botPath = null; botStuckTimer = 0; }

  if (botPath && botPathIdx < botPath.length) {
    const tgt = gridToWorld(botPath[botPathIdx].x, botPath[botPathIdx].z);
    tgt.y = nextbotSprite.position.y;
    const dir = new THREE.Vector3().subVectors(tgt, nextbotSprite.position);
    dir.y = 0;
    const d = dir.length();
    if (d < 0.8) {
      botPathIdx++;
    } else {
      dir.normalize();
      const spd = dist < 12 ? BOT_FAST : BOT_BASE;
      const mv = dir.multiplyScalar(spd * dt);
      const nx = nextbotSprite.position.x + mv.x;
      const nz = nextbotSprite.position.z + mv.z;
      if (!testCollisionX(nx, nextbotSprite.position.z, 0.5)) nextbotSprite.position.x = nx;
      if (!testCollisionZ(nextbotSprite.position.x, nz, 0.5)) nextbotSprite.position.z = nz;
    }
  } else {
    const dir = new THREE.Vector3().subVectors(playerPos, nextbotSprite.position);
    dir.y = 0;
    if (dir.length() > 1) {
      dir.normalize();
      const spd = dist < 12 ? BOT_FAST : BOT_BASE;
      const mv = dir.multiplyScalar(spd * dt * 0.5);
      const nx = nextbotSprite.position.x + mv.x;
      const nz = nextbotSprite.position.z + mv.z;
      if (!testCollisionX(nx, nextbotSprite.position.z, 0.5)) nextbotSprite.position.x = nx;
      if (!testCollisionZ(nextbotSprite.position.x, nz, 0.5)) nextbotSprite.position.z = nz;
    }
  }

  const feetBot = nextbotSprite.position.y - 2.5;
  const botGround = getFloorY(nextbotSprite.position.x, nextbotSprite.position.z);
  if (feetBot <= botGround) nextbotSprite.position.y = botGround + 2.5;

  const bobSpeed = dist < 12 ? 10 : 6;
  const bobAmp = dist < 12 ? 0.25 : 0.12;
  nextbotSprite.position.y += Math.sin(Date.now() * 0.001 * bobSpeed) * bobAmp * dt * 5;

  botLight.position.set(nextbotSprite.position.x, 4, nextbotSprite.position.z);
  botLight2.position.set(nextbotSprite.position.x, 1, nextbotSprite.position.z);

  const intensity = dist < 8 ? 4 : (dist < 20 ? 1.8 : 0.6);
  botLight.intensity = intensity + Math.sin(Date.now() * 0.01) * 0.8;

  if (dist < CAP_R) triggerCapture();
}

/* ─── AUDIO ─── */
const listener = new THREE.AudioListener();
camera.add(listener);

let musicBuffer = null, musicSource = null, musicGain = null, musicPlaying = false;

async function loadMusic() {
  try {
    const resp = await fetch('mbappe_song.mp3');
    const buf = await resp.arrayBuffer();
    musicBuffer = await listener.context.decodeAudioData(buf);
  } catch (e) { console.warn('Music load failed:', e); }
}

function startMusic() {
  if (!musicBuffer || musicPlaying) return;
  musicSource = listener.context.createBufferSource();
  musicSource.buffer = musicBuffer;
  musicSource.loop = true;
  musicGain = listener.context.createGain();
  musicGain.gain.value = 0;
  musicSource.connect(musicGain);
  musicGain.connect(listener.context.destination);
  musicSource.start();
  musicPlaying = true;
}

function updateAudio() {
  if (!musicPlaying || !musicGain) return;
  const dist = nextbotSprite.position.distanceTo(playerPos);
  const maxDist = 35;
  const raw = Math.max(0, 1 - dist / maxDist);
  const vol = raw * raw * raw;
  musicGain.gain.setTargetAtTime(Math.min(vol, 0.95), listener.context.currentTime, 0.08);

  const warn = document.getElementById('warning');
  const vhs = document.getElementById('vhs-overlay');
  if (dist < 14) {
    warn.style.display = 'block';
    vhs.style.display = 'block';
    warn.style.opacity = String(0.5 + (1 - dist / 14) * 0.5);
  } else {
    warn.style.display = 'none';
    vhs.style.display = 'none';
  }

  if (dist < 10) shakeAmount = Math.max(shakeAmount, (1 - dist / 10) * 0.02);
}

/* ─── MINIMAP ─── */
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx = mmCanvas.getContext('2d');

function updateMinimap() {
  mmCtx.fillStyle = '#0a0808';
  mmCtx.fillRect(0, 0, 160, 160);

  const sc = 0.6;
  const px = (playerPos.x - gridOffsetX) * sc;
  const pz = (playerPos.z - gridOffsetZ) * sc;
  const ox = 80 - px;
  const oz = 80 - pz;

  mmCtx.fillStyle = '#2a2520';
  for (let gz = 0; gz < gridH; gz += 2) {
    for (let gx = 0; gx < gridW; gx += 2) {
      if (!isGridWall(gx, gz)) continue;
      const sx = gx * GRID_SIZE * sc + ox;
      const sz = gz * GRID_SIZE * sc + oz;
      if (sx < -20 || sx > 180 || sz < -20 || sz > 180) continue;
      mmCtx.fillRect(sx, sz, GRID_SIZE * sc * 2, GRID_SIZE * sc * 2);
    }
  }

  mmCtx.fillStyle = '#40ff40';
  mmCtx.beginPath();
  mmCtx.arc(80, 80, 2.5, 0, Math.PI * 2);
  mmCtx.fill();

  const bpx = (nextbotSprite.position.x - gridOffsetX) * sc;
  const bpz = (nextbotSprite.position.z - gridOffsetZ) * sc;
  mmCtx.fillStyle = '#ff0040';
  mmCtx.beginPath();
  mmCtx.arc(bpx + ox, bpz + oz, 3, 0, Math.PI * 2);
  mmCtx.fill();

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  mmCtx.strokeStyle = 'rgba(64,255,64,.5)';
  mmCtx.lineWidth = 1;
  mmCtx.beginPath();
  mmCtx.moveTo(80, 80);
  mmCtx.lineTo(80 + dir.x * 10, 80 + dir.z * 10);
  mmCtx.stroke();
}

/* ─── GAME STATE ─── */
let gameStarted = false;
let gameOver = false;

function triggerCapture() {
  if (gameOver) return;
  gameOver = true;
  document.exitPointerLock();

  if (musicPlaying && musicGain) {
    musicGain.gain.setTargetAtTime(1.0, listener.context.currentTime, 0.01);
  }

  document.getElementById('death-text').style.display = 'block';
  document.getElementById('crosshair').style.display = 'none';
  document.getElementById('stamina-bar').style.display = 'none';
  document.getElementById('stamina-hint').style.display = 'none';
  document.getElementById('warning').style.display = 'none';
  document.getElementById('vhs-overlay').style.display = 'none';
  document.getElementById('minimap-wrap').style.display = 'none';

  setTimeout(() => {
    document.getElementById('death-text').style.display = 'none';
    const vid = document.getElementById('jumpscare-video');
    const cap = document.getElementById('capture-overlay');
    cap.style.display = 'block';
    vid.style.display = 'block';
    vid.src = 'ankara_messi.mp4';
    vid.play();
    vid.onended = () => {
      window.close();
      window.location.href = 'about:blank';
      document.documentElement.innerHTML = '<head></head><body style="margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#000;color:#fff;font-family:monospace;font-size:2rem;letter-spacing:5px">FIM DE JOGO</body>';
    };
  }, 1200);
}

/* ─── AUDIO LOAD ─── */
await loadMusic();

/* ─── LOADING DONE → SHOW MENU ─── */
document.getElementById('loading').style.display = 'none';
document.getElementById('overlay').style.display = 'flex';

document.getElementById('start-btn').addEventListener('click', async () => {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('crosshair').style.display = 'block';
  document.getElementById('stamina-bar').style.display = 'block';
  document.getElementById('stamina-hint').style.display = 'block';
  document.getElementById('minimap-wrap').style.display = 'block';
  gameStarted = true;
  renderer.domElement.requestPointerLock();
  if (listener.context.state === 'suspended') await listener.context.resume();
  startMusic();
  clock.start();
  animate();
});

const clock = new THREE.Clock();

function animate() {
  if (gameOver) { renderer.render(scene, camera); return; }
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (locked) updatePlayer(dt);
  updateBot(dt);
  updateAudio();
  updateMinimap();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
