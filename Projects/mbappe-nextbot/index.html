<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBAPPÉ NEXTBOT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace}
canvas#game-canvas{display:block}

#overlay{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;color:#fff}
#overlay h1{font-size:clamp(2rem,6vw,5rem);color:#ff0040;text-shadow:0 0 30px #ff0040,0 0 60px #ff0000;animation:pulse 1.5s ease-in-out infinite}
#overlay .sub{font-size:1rem;color:#666;margin:0.5rem 0 2rem;letter-spacing:4px}
#overlay .controls-info{margin-top:1rem;padding:1.5rem 2.5rem;border:1px solid #222;border-radius:4px;background:rgba(255,0,64,0.02);font-size:0.85rem;line-height:2}
#overlay .controls-info span{color:#ff0040;font-weight:bold}
#start-btn{margin-top:2rem;padding:1rem 3rem;font-size:1.3rem;font-family:'Courier New',monospace;font-weight:700;background:#ff0040;color:#fff;border:none;border-radius:2px;cursor:pointer;text-transform:uppercase;letter-spacing:4px;transition:all .3s}
#start-btn:hover{background:#ff2060;box-shadow:0 0 40px rgba(255,0,64,.6)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.03)}}

#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;pointer-events:none;display:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.6)}
#crosshair::before{top:8px;left:0;width:20px;height:2px}
#crosshair::after{top:0;left:8px;width:2px;height:20px}

#stamina-bar{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);width:200px;height:6px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);border-radius:3px;z-index:100;display:none}
#stamina-fill{height:100%;width:100%;background:#40ff40;border-radius:2px;transition:width .05s linear}

#warning{position:fixed;top:20px;left:50%;transform:translateX(-50%);font-size:1.3rem;color:#ff0040;text-shadow:0 0 15px #ff0040;z-index:100;display:none;animation:blink .4s ease-in-out infinite;letter-spacing:3px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

#vhs-overlay{position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.15) 0px,rgba(0,0,0,.15) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:99;display:none}

#jumpscare-video{position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover;z-index:2000;display:none}
#capture-overlay{position:fixed;inset:0;background:#000;z-index:1999;display:none}

#minimap-wrap{position:fixed;top:15px;right:15px;width:160px;height:160px;border:1px solid rgba(255,0,64,.4);background:rgba(0,0,0,.8);z-index:100;display:none;border-radius:4px;overflow:hidden}
#minimap-canvas{width:160px;height:160px}

#stamina-hint{position:fixed;bottom:42px;left:50%;transform:translateX(-50%);font-size:.65rem;color:rgba(255,255,255,.3);z-index:100;display:none}

#death-text{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3rem;color:#ff0040;z-index:2001;display:none;text-shadow:0 0 20px #ff0040;font-weight:700;letter-spacing:5px}

#loading{position:fixed;inset:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1001;color:#fff}
#loading .spinner{width:40px;height:40px;border:3px solid #222;border-top-color:#ff0040;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:1rem}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:#666;font-size:.9rem}
#loading .error{color:#ff4444;font-size:.8rem;margin-top:.5rem;max-width:400px;text-align:center}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

const $ = id => document.getElementById(id);

/* ─── CONSTANTS ─── */
const PR = 0.35;
const EYE = 1.7;
const GRAV = -28;
const JUMP = 9.5;
const WALK = 6;
const RUN = 10.5;
const BOT_BASE = 7;
const BOT_FAST = 12;
const CAP_R = 1.8;
const MAX_STAM = 100;
const STAM_DRAIN = 28;
const STAM_REGEN = 10;

/* ─── RENDERER ─── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0808);
scene.fog = new THREE.Fog(0xaaaaaa, 80, 200);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.8;
document.body.appendChild(renderer.domElement);
renderer.domElement.id = 'game-canvas';

const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 500);

scene.add(new THREE.AmbientLight(0xffffff, 1.5));
scene.add(new THREE.HemisphereLight(0xffffff, 0xaaaaaa, 1.0));

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(50, 100, 30);
scene.add(dirLight);

scene.add(camera);

/* ─── COLLISION ─── */
const colliders = [];
let mapMeshes = [];
let floorYData = null;
let useMeshCollision = false;
let proceduralLayouts = [];
const meshRaycaster = new THREE.Raycaster();
const _rayOrigin = new THREE.Vector3();
const _rayDir = new THREE.Vector3(0, -1, 0);
const _v = [new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3()];

function addColliderFromMesh(mesh) {
  if (useMeshCollision) return;
  const bbox = new THREE.Box3().setFromObject(mesh);
  const size = new THREE.Vector3();
  bbox.getSize(size);
  if (size.x < 0.01 || size.y < 0.01 || size.z < 0.01) return;
  colliders.push(bbox);
}

function testCollisionAt(px, pz, r) {
  if (!useMeshCollision) {
    for (const b of colliders) {
      const closestZ = Math.max(b.min.z, Math.min(pz, b.max.z));
      if (Math.abs(pz - closestZ) < r) {
        if (px + r > b.min.x && px - r < b.max.x) return true;
      }
      const closestX = Math.max(b.min.x, Math.min(px, b.max.x));
      if (Math.abs(px - closestX) < r) {
        if (pz + r > b.min.z && pz - r < b.max.z) return true;
      }
    }
    return false;
  }
  const minGx = Math.max(0, Math.floor((px - r - gridOffsetX) / GRID_SIZE));
  const maxGx = Math.min(gridW - 1, Math.floor((px + r - gridOffsetX) / GRID_SIZE));
  const minGz = Math.max(0, Math.floor((pz - r - gridOffsetZ) / GRID_SIZE));
  const maxGz = Math.min(gridH - 1, Math.floor((pz + r - gridOffsetZ) / GRID_SIZE));
  for (let gz = minGz; gz <= maxGz; gz++) {
    for (let gx = minGx; gx <= maxGx; gx++) {
      if (wallGrid[gz * gridW + gx] === 1) return true;
    }
  }
  return false;
}

function testCollisionX(px, pz, r) { return testCollisionAt(px, pz, r); }
function testCollisionZ(px, pz, r) { return testCollisionAt(px, pz, r); }

function getFloorY(px, pz, currentFeetY) {
  if (useMeshCollision && floorYData) {
    const gx = Math.floor((px - gridOffsetX) / GRID_SIZE);
    const gz = Math.floor((pz - gridOffsetZ) / GRID_SIZE);
    if (gx >= 0 && gx < gridW && gz >= 0 && gz < gridH) {
      const floors = floorYData[gz * gridW + gx];
      if (floors && floors.length > 0) {
        const tol = 0.6;
        let best = -999;
        for (let i = 0; i < floors.length; i++) {
          if (floors[i] <= currentFeetY + tol && floors[i] > best) best = floors[i];
        }
        if (best > -999) return best;
        return floors[0];
      }
    }
    return -19.6;
  }
  let maxY = -999;
  for (const b of colliders) {
    if (px >= b.min.x - 0.1 && px <= b.max.x + 0.1 &&
        pz >= b.min.z - 0.1 && pz <= b.max.z + 0.1) {
      if (b.max.y > maxY && b.min.y < maxY + 1) {
        maxY = b.max.y;
      }
    }
  }
  return maxY > -999 ? maxY : 0;
}

/* ─── PLAYER STATE ─── */
const playerPos = new THREE.Vector3(0, EYE, 0);
const playerVel = new THREE.Vector3(0, 0, 0);
let onGround = true;
const euler = new THREE.Euler(0, 0, 0, 'YXZ');
const keys = {};
let locked = false;
let stamina = MAX_STAM;
let sprinting = false;
let headBob = 0;
let shakeAmount = 0;
let floorY = 0;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'ShiftLeft') sprinting = true;
  if (['Space','KeyW','KeyS','KeyA','KeyD'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'ShiftLeft') sprinting = false;
});

renderer.domElement.addEventListener('click', () => {
  if (!locked && gameStarted && !gameOver) renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === renderer.domElement;
});
document.addEventListener('mousemove', e => {
  if (!locked) return;
  euler.y -= e.movementX * 0.002;
  euler.x -= e.movementY * 0.002;
  euler.x = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, euler.x));
  camera.quaternion.setFromEuler(euler);
});

/* ─── PLAYER UPDATE ─── */
let bobTimer = 0;

function updatePlayer(dt) {
  const fwd = new THREE.Vector3();
  camera.getWorldDirection(fwd);
  fwd.y = 0;
  fwd.normalize();
  const right = new THREE.Vector3().crossVectors(fwd, new THREE.Vector3(0, 1, 0)).normalize();

  const move = new THREE.Vector3();
  if (keys['KeyW']) move.add(fwd);
  if (keys['KeyS']) move.sub(fwd);
  if (keys['KeyD']) move.add(right);
  if (keys['KeyA']) move.sub(right);
  if (move.lengthSq() > 0) move.normalize();

  const canSprint = sprinting && stamina > 0 && move.lengthSq() > 0;
  const spd = canSprint ? RUN : WALK;
  if (canSprint) stamina = Math.max(0, stamina - STAM_DRAIN * dt);
  else stamina = Math.min(MAX_STAM, stamina + STAM_REGEN * dt);

  const dx = move.x * spd * dt;
  const dz = move.z * spd * dt;

  if (!testCollisionX(playerPos.x + dx, playerPos.z, PR)) playerPos.x += dx;
  if (!testCollisionZ(playerPos.x, playerPos.z + dz, PR)) playerPos.z += dz;

  if (keys['Space'] && onGround) {
    playerVel.y = JUMP;
    onGround = false;
  }
  playerVel.y += GRAV * dt;
  playerPos.y += playerVel.y * dt;

  const feetY = playerPos.y - EYE;
  const ground = getFloorY(playerPos.x, playerPos.z, feetY);
  if (feetY <= ground + 0.05) {
    playerPos.y = ground + EYE;
    playerVel.y = 0;
    onGround = true;
    floorY = ground;
  }

  if (move.lengthSq() > 0 && onGround) {
    const bobSpeed = canSprint ? 14 : 10;
    headBob += dt * bobSpeed;
    const bobY = Math.sin(headBob) * (canSprint ? 0.06 : 0.03);
    const bobX = Math.cos(headBob * 0.5) * (canSprint ? 0.02 : 0.01);
    camera.position.set(playerPos.x + bobX, playerPos.y + bobY, playerPos.z);
  } else {
    headBob = 0;
    camera.position.set(playerPos.x, playerPos.y, playerPos.z);
  }

  if (shakeAmount > 0) {
    camera.position.x += (Math.random() - 0.5) * shakeAmount;
    camera.position.y += (Math.random() - 0.5) * shakeAmount;
    shakeAmount *= 0.92;
    if (shakeAmount < 0.001) shakeAmount = 0;
  }

  $('stamina-fill').style.width = (stamina / MAX_STAM * 100) + '%';
  $('stamina-fill').style.background = stamina < 25 ? '#ff3030' : '#40ff40';
}

/* ─── GRID FOR PATHFINDING ─── */
let GRID_SIZE = 0.5;
let gridW = 10, gridH = 10;
let gridOffsetX = -5, gridOffsetZ = -5;
let wallGrid = new Uint8Array(100);

function initGrid(minX, minZ, maxX, maxZ) {
  const margin = 2;
  GRID_SIZE = 0.5;
  gridOffsetX = Math.floor((minX - margin) / GRID_SIZE) * GRID_SIZE;
  gridOffsetZ = Math.floor((minZ - margin) / GRID_SIZE) * GRID_SIZE;
  gridW = Math.ceil(((maxX + margin) - gridOffsetX) / GRID_SIZE);
  gridH = Math.ceil(((maxZ + margin) - gridOffsetZ) / GRID_SIZE);
  wallGrid = new Uint8Array(gridW * gridH);
  console.log(`Grid: ${gridW}x${gridH} (${gridW*gridH} cells) covering X[${gridOffsetX.toFixed(1)}..${(gridOffsetX+gridW*GRID_SIZE).toFixed(1)}] Z[${gridOffsetZ.toFixed(1)}..${(gridOffsetZ+gridH*GRID_SIZE).toFixed(1)}]`);
}

function buildWallGridFromMeshes(meshes) {
  wallGrid.fill(0);
  floorYData = new Array(gridW * gridH);
  for (let i = 0; i < floorYData.length; i++) floorYData[i] = [];
  const pr = PR;
  for (const mesh of meshes) {
    const geo = mesh.geometry;
    const pos = geo.attributes.position;
    const idx = geo.index;
    const worldMat = mesh.matrixWorld;
    const triCount = idx ? idx.count / 3 : pos.count / 3;
    for (let t = 0; t < triCount; t++) {
      const ia = idx ? idx.getX(t * 3) : t * 3;
      const ib = idx ? idx.getX(t * 3 + 1) : t * 3 + 1;
      const ic = idx ? idx.getX(t * 3 + 2) : t * 3 + 2;
      _v[0].fromBufferAttribute(pos, ia).applyMatrix4(worldMat);
      _v[1].fromBufferAttribute(pos, ib).applyMatrix4(worldMat);
      _v[2].fromBufferAttribute(pos, ic).applyMatrix4(worldMat);
      const e1x = _v[1].x - _v[0].x, e1y = _v[1].y - _v[0].y, e1z = _v[1].z - _v[0].z;
      const e2x = _v[2].x - _v[0].x, e2y = _v[2].y - _v[0].y, e2z = _v[2].z - _v[0].z;
      const nx = e1y * e2z - e1z * e2y;
      const ny = e1z * e2x - e1x * e2z;
      const nz = e1x * e2y - e1y * e2x;
      const nl = Math.sqrt(nx * nx + ny * ny + nz * nz) || 1;
      const absNY = Math.abs(ny / nl);
      const triMinX = Math.min(_v[0].x, _v[1].x, _v[2].x);
      const triMaxX = Math.max(_v[0].x, _v[1].x, _v[2].x);
      const triMinZ = Math.min(_v[0].z, _v[1].z, _v[2].z);
      const triMaxZ = Math.max(_v[0].z, _v[1].z, _v[2].z);
      const triMaxY = Math.max(_v[0].y, _v[1].y, _v[2].y);
      if (absNY < 0.7) {
        const mgx = Math.max(0, Math.floor((triMinX - gridOffsetX - pr) / GRID_SIZE));
        const xgx = Math.min(gridW - 1, Math.floor((triMaxX - gridOffsetX + pr) / GRID_SIZE));
        const mgz = Math.max(0, Math.floor((triMinZ - gridOffsetZ - pr) / GRID_SIZE));
        const xgz = Math.min(gridH - 1, Math.floor((triMaxZ - gridOffsetZ + pr) / GRID_SIZE));
        for (let gz = mgz; gz <= xgz; gz++) {
          for (let gx = mgx; gx <= xgx; gx++) {
            wallGrid[gz * gridW + gx] = 1;
          }
        }
      }
      if (absNY >= 0.7) {
        const avgY = (_v[0].y + _v[1].y + _v[2].y) / 3;
        const mgx = Math.max(0, Math.floor((triMinX - gridOffsetX) / GRID_SIZE));
        const xgx = Math.min(gridW - 1, Math.floor((triMaxX - gridOffsetX) / GRID_SIZE));
        const mgz = Math.max(0, Math.floor((triMinZ - gridOffsetZ) / GRID_SIZE));
        const xgz = Math.min(gridH - 1, Math.floor((triMaxZ - gridOffsetZ) / GRID_SIZE));
        for (let gz = mgz; gz <= xgz; gz++) {
          for (let gx = mgx; gx <= xgx; gx++) {
            const arr = floorYData[gz * gridW + gx];
            if (arr.length === 0 || Math.abs(arr[arr.length - 1] - avgY) > 0.15) {
              arr.push(avgY);
            }
          }
        }
      }
    }
  }
  for (let i = 0; i < floorYData.length; i++) {
    floorYData[i].sort((a, b) => a - b);
  }
  let wallCount = 0;
  for (let i = 0; i < wallGrid.length; i++) if (wallGrid[i]) wallCount++;
  console.log(`Wall cells: ${wallCount}/${wallGrid.length}`);
}

function buildWallGridFromAABBs() {
  wallGrid.fill(0);
  for (let gz = 0; gz < gridH; gz++) {
    for (let gx = 0; gx < gridW; gx++) {
      const wx = gx * GRID_SIZE + gridOffsetX + GRID_SIZE / 2;
      const wz = gz * GRID_SIZE + gridOffsetZ + GRID_SIZE / 2;
      for (const b of colliders) {
        const hw = (b.max.x - b.min.x) / 2;
        const hd = (b.max.z - b.min.z) / 2;
        const hh = b.max.y - b.min.y;
        if (hh < 0.3 || hw > 30 || hd > 30) continue;
        const cx = (b.min.x + b.max.x) / 2;
        const cz = (b.min.z + b.max.z) / 2;
        const dx = Math.abs(wx - cx);
        const dz = Math.abs(wz - cz);
        if (dx < hw + PR && dz < hd + PR && b.max.y > 0.5) {
          wallGrid[gz * gridW + gx] = 1;
          break;
        }
      }
    }
  }
}

function buildWallGridFromLayouts() {
  wallGrid.fill(0);
  const cellSize = 2.5;
  const floorH = 3.6;
  const gW = 60, gH = 60;
  const halfW = gW / 2, halfH = gH / 2;
  floorYData = new Array(gridW * gridH);
  for (let i = 0; i < floorYData.length; i++) floorYData[i] = [];
  for (let f = 0; f < proceduralLayouts.length; f++) {
    const map = proceduralLayouts[f];
    const baseY = f * floorH;
    for (let gz = 0; gz < gridH; gz++) {
      for (let gx = 0; gx < gridW; gx++) {
        const wx = gx * GRID_SIZE + gridOffsetX + GRID_SIZE / 2;
        const wz = gz * GRID_SIZE + gridOffsetZ + GRID_SIZE / 2;
        const lx = Math.round(wx / cellSize + halfW);
        const lz = Math.round(wz / cellSize + halfH);
        if (lx < 0 || lx >= gW || lz < 0 || lz >= gH) continue;
        const idx = gz * gridW + gx;
        if (map[lz][lx] === 1) {
          wallGrid[idx] = 1;
        } else {
          const arr = floorYData[idx];
          if (arr.length === 0 || Math.abs(arr[arr.length - 1] - baseY) > 0.15) {
            arr.push(baseY);
          }
        }
      }
    }
  }
  for (let i = 0; i < floorYData.length; i++) floorYData[i].sort((a, b) => a - b);
  useMeshCollision = true;
  let wallCount = 0;
  for (let i = 0; i < wallGrid.length; i++) if (wallGrid[i]) wallCount++;
  console.log(`Layout grid: ${wallCount}/${wallGrid.length} wall cells, ${proceduralLayouts.length} floors`);
}

function isGridWall(gx, gz) {
  if (gx < 0 || gx >= gridW || gz < 0 || gz >= gridH) return true;
  return wallGrid[gz * gridW + gx] === 1;
}

function worldToGrid(pos) {
  return {
    x: Math.floor((pos.x - gridOffsetX) / GRID_SIZE),
    z: Math.floor((pos.z - gridOffsetZ) / GRID_SIZE),
  };
}

function gridToWorld(gx, gz) {
  return new THREE.Vector3(gx * GRID_SIZE + gridOffsetX + GRID_SIZE / 2, 0, gz * GRID_SIZE + gridOffsetZ + GRID_SIZE / 2);
}

function bfsPath(sx, sz, gx, gz) {
  if (sx === gx && sz === gz) return [{ x: gx, z: gz }];
  if (isGridWall(gx, gz)) return null;
  if (sx < 0 || sx >= gridW || sz < 0 || sz >= gridH) return null;
  const visited = new Uint8Array(gridW * gridH);
  const parent = new Int32Array(gridW * gridH).fill(-1);
  const queue = [sz * gridW + sx];
  visited[sz * gridW + sx] = 1;
  while (queue.length > 0) {
    const cur = queue.shift();
    const cx = cur % gridW;
    const cz = (cur / gridW) | 0;
    const nbrs = [
      [cx + 1, cz], [cx - 1, cz],
      [cx, cz + 1], [cx, cz - 1]
    ];
    for (const [nx, nz] of nbrs) {
      if (nx === gx && nz === gz) {
        const path = [{ x: nx, z: nz }];
        let p = cur;
        while (p !== sz * gridW + sx) {
          path.unshift({ x: p % gridW, z: (p / gridW) | 0 });
          p = parent[p];
        }
        return path;
      }
      if (nx >= 0 && nx < gridW && nz >= 0 && nz < gridH) {
        const ni = nz * gridW + nx;
        if (!visited[ni] && !isGridWall(nx, nz)) {
          visited[ni] = 1;
          parent[ni] = cur;
          queue.push(ni);
        }
      }
    }
  }
  return null;
}

/* ─── NEXTBOT ─── */
let nextbotSprite, botLight, botLight2;
let botPath = null, botPathIdx = 0, botRecalcTimer = 0, botStuckTimer = 0;
const botLastPos = new THREE.Vector3();
let botActivated = false;

function createNextbot(spawnPos) {
  const nextbotTex = new THREE.TextureLoader().load('mbappe.png');
  nextbotTex.colorSpace = THREE.SRGBColorSpace;
  nextbotSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: nextbotTex }));
  nextbotSprite.scale.set(3.5, 5, 1);
  nextbotSprite.position.copy(spawnPos);
  nextbotSprite.position.y = 2.5;
  scene.add(nextbotSprite);

  botLight = new THREE.PointLight(0xff0022, 2, 20);
  botLight.position.copy(nextbotSprite.position);
  botLight.position.y = 4;
  scene.add(botLight);

  botLight2 = new THREE.PointLight(0xff4400, 0.6, 10);
  botLight2.position.copy(nextbotSprite.position);
  botLight2.position.y = 1;
  scene.add(botLight2);

  botLastPos.copy(nextbotSprite.position);
}

function updateBot(dt) {
  const dist = nextbotSprite.position.distanceTo(playerPos);
  if (dist < 45 && !botActivated) botActivated = true;
  if (!botActivated) return;

  const bg = worldToGrid(nextbotSprite.position);
  const pg = worldToGrid(playerPos);

  botRecalcTimer += dt;
  const recalcRate = dist < 12 ? 0.2 : 0.5;
  if (botRecalcTimer >= recalcRate || !botPath) {
    botRecalcTimer = 0;
    const p = bfsPath(bg.x, bg.z, pg.x, pg.z);
    if (p && p.length > 1) { botPath = p; botPathIdx = 1; }
  }

  const stuck = nextbotSprite.position.distanceTo(botLastPos) < 0.05;
  if (stuck) botStuckTimer += dt;
  else botStuckTimer = 0;
  botLastPos.copy(nextbotSprite.position);
  if (botStuckTimer > 2.5) { botPath = null; botStuckTimer = 0; }

  if (botPath && botPathIdx < botPath.length) {
    const tgt = gridToWorld(botPath[botPathIdx].x, botPath[botPathIdx].z);
    tgt.y = nextbotSprite.position.y;
    const dir = new THREE.Vector3().subVectors(tgt, nextbotSprite.position);
    dir.y = 0;
    const d = dir.length();
    if (d < 0.8) {
      botPathIdx++;
    } else {
      dir.normalize();
      const spd = dist < 12 ? BOT_FAST : BOT_BASE;
      const mv = dir.multiplyScalar(spd * dt);
      const nx = nextbotSprite.position.x + mv.x;
      const nz = nextbotSprite.position.z + mv.z;
      if (!testCollisionX(nx, nextbotSprite.position.z, 0.5)) nextbotSprite.position.x = nx;
      if (!testCollisionZ(nextbotSprite.position.x, nz, 0.5)) nextbotSprite.position.z = nz;
    }
  } else {
    const dir = new THREE.Vector3().subVectors(playerPos, nextbotSprite.position);
    dir.y = 0;
    if (dir.length() > 1) {
      dir.normalize();
      const spd = dist < 12 ? BOT_FAST : BOT_BASE;
      const mv = dir.multiplyScalar(spd * dt * 0.5);
      const nx = nextbotSprite.position.x + mv.x;
      const nz = nextbotSprite.position.z + mv.z;
      if (!testCollisionX(nx, nextbotSprite.position.z, 0.5)) nextbotSprite.position.x = nx;
      if (!testCollisionZ(nextbotSprite.position.x, nz, 0.5)) nextbotSprite.position.z = nz;
    }
  }

  const botGround = getFloorY(nextbotSprite.position.x, nextbotSprite.position.z, nextbotSprite.position.y - 2.5);
  nextbotSprite.position.y = botGround + 2.5 + Math.sin(Date.now() * 0.005) * 0.15;

  botLight.position.set(nextbotSprite.position.x, 4, nextbotSprite.position.z);
  botLight2.position.set(nextbotSprite.position.x, 1, nextbotSprite.position.z);
  botLight.intensity = (dist < 8 ? 4 : dist < 20 ? 1.8 : 0.6) + Math.sin(Date.now() * 0.01) * 0.8;

  if (dist < CAP_R) triggerCapture();
}

const listener = new THREE.AudioListener();
camera.add(listener);
let musicBuffer = null, musicSource = null, musicGain = null, musicPlaying = false;

async function loadMusic() {
  try {
    const resp = await fetch('mbappe_song.mp3');
    const buf = await resp.arrayBuffer();
    musicBuffer = await listener.context.decodeAudioData(buf);
  } catch (e) { console.warn('Music load failed:', e); }

function startMusic() {
  if (!musicBuffer || musicPlaying) return;
  musicSource = listener.context.createBufferSource();
  musicSource.buffer = musicBuffer;
  musicSource.loop = true;
  musicGain = listener.context.createGain();
  musicGain.gain.value = 0;
  musicSource.connect(musicGain);
  musicGain.connect(listener.context.destination);
  musicSource.start();
  musicPlaying = true;
}

function updateAudio() {
  if (!musicPlaying || !musicGain) return;
  const dist = nextbotSprite.position.distanceTo(playerPos);
  const raw = Math.max(0, 1 - dist / 35);
  musicGain.gain.setTargetAtTime(Math.min(raw * raw * raw, 0.95), listener.context.currentTime, 0.08);

  if (dist < 14) {
    $('warning').style.display = 'block';
    $('vhs-overlay').style.display = 'block';
    $('warning').style.opacity = String(0.5 + (1 - dist / 14) * 0.5);
  } else {
    $('warning').style.display = 'none';
    $('vhs-overlay').style.display = 'none';
  }

  if (dist < 10) shakeAmount = Math.max(shakeAmount, (1 - dist / 10) * 0.02);
}

/* ─── MINIMAP ─── */
const mmCanvas = $('minimap-canvas');
const mmCtx = mmCanvas.getContext('2d');

function updateMinimap() {
  mmCtx.fillStyle = '#0a0808';
  mmCtx.fillRect(0, 0, 160, 160);
  const mapExtentX = gridW * GRID_SIZE;
  const mapExtentZ = gridH * GRID_SIZE;
  const sc = Math.min(140 / mapExtentX, 140 / mapExtentZ);
  const px = (playerPos.x - gridOffsetX) * sc;
  const pz = (playerPos.z - gridOffsetZ) * sc;
  const ox = 80 - px;
  const oz = 80 - pz;

  mmCtx.fillStyle = '#2a2520';
  const step = Math.max(1, Math.floor(2 / GRID_SIZE));
  for (let gz = 0; gz < gridH; gz += step) {
    for (let gx = 0; gx < gridW; gx += step) {
      if (!isGridWall(gx, gz)) continue;
      const sx = gx * GRID_SIZE * sc + ox;
      const sz = gz * GRID_SIZE * sc + oz;
      if (sx < -5 || sx > 165 || sz < -5 || sz > 165) continue;
      mmCtx.fillRect(sx, sz, Math.max(1, GRID_SIZE * sc * step), Math.max(1, GRID_SIZE * sc * step));
    }
  }

  mmCtx.fillStyle = '#40ff40';
  mmCtx.beginPath();
  mmCtx.arc(80, 80, 2.5, 0, Math.PI * 2);
  mmCtx.fill();

  const bpx = (nextbotSprite.position.x - gridOffsetX) * sc;
  const bpz = (nextbotSprite.position.z - gridOffsetZ) * sc;
  mmCtx.fillStyle = '#ff0040';
  mmCtx.beginPath();
  mmCtx.arc(bpx + ox, bpz + oz, 3, 0, Math.PI * 2);
  mmCtx.fill();

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  mmCtx.strokeStyle = 'rgba(64,255,64,.5)';
  mmCtx.lineWidth = 1;
  mmCtx.beginPath();
  mmCtx.moveTo(80, 80);
  mmCtx.lineTo(80 + dir.x * 10, 80 + dir.z * 10);
  mmCtx.stroke();
}

function findSpawnPos() {
  if (useMeshCollision && floorYData) {
    for (let r = 0; r < 60; r += 2) {
      for (let dx = -r; dx <= r; dx += 2) {
        for (let dz = -r; dz <= r; dz += 2) {
          if (!testCollisionAt(dx, dz, PR)) {
            const feet = getFloorY(dx, dz, -999);
            if (feet > -900) return new THREE.Vector3(dx, feet + EYE, dz);
          }
        }
      }
    }
  }
  for (let r = 0; r < 60; r += 3) {
    for (let dx = -r; dx <= r; dx += 3) {
      for (let dz = -r; dz <= r; dz += 3) {
        if (!testCollisionAt(dx, dz, PR)) {
          return new THREE.Vector3(dx, EYE, dz);
        }
      }
    }
  }
  return new THREE.Vector3(0, EYE, 0);
}

function findBotSpawnPos(playerP) {
  let best = null, bestDist = 0;
  const minX = gridOffsetX + 2, maxX = gridOffsetX + gridW * GRID_SIZE - 2;
  const minZ = gridOffsetZ + 2, maxZ = gridOffsetZ + gridH * GRID_SIZE - 2;
  for (let x = minX; x < maxX; x += 3) {
    for (let z = minZ; z < maxZ; z += 3) {
      if (!testCollisionAt(x, z, 0.5)) {
        const dx = x - playerP.x, dz = z - playerP.z;
        const d = dx * dx + dz * dz;
        if (d > bestDist && d > 16) { bestDist = d; best = new THREE.Vector3(x, 0, z); }
      }
    }
  }
  if (best) {
    const botFeet = getFloorY(best.x, best.z, -999);
    if (botFeet > -900) best.y = botFeet;
  }
  return best || new THREE.Vector3(10, 0, 10);
}

/* ─── PROCEDURAL MAP ─── */
function buildFallbackMap() {
  const C = 2.5;
  const WH = 3.6;
  const FLOORS = 4;
  const GW = 60;
  const GH = 60;
  const halfW = GW / 2;
  const halfH = GH / 2;

  function mulberry32(a) {
    return function() {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function makeTex(w, h, fn) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    fn(ctx, w, h);
    const t = new THREE.CanvasTexture(c);
    t.colorSpace = THREE.SRGBColorSpace;
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.magFilter = THREE.LinearFilter;
    return t;
  }

  const wallTex = makeTex(128, 128, (ctx, w, h) => {
    ctx.fillStyle = '#bfb5a5';
    ctx.fillRect(0, 0, w, h);
    for (let i = 0; i < 2000; i++) {
      ctx.fillStyle = `rgba(${80+Math.random()*40},${70+Math.random()*30},${60+Math.random()*25},${Math.random()*0.08})`;
      ctx.fillRect(Math.random()*w, Math.random()*h, 1+Math.random()*2, 1+Math.random()*2);
    }
    const bh = 16;
    for (let row = 0; row < h / bh; row++) {
      const y = row * bh;
      ctx.strokeStyle = 'rgba(140,130,115,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
      const bw = row % 2 === 0 ? 64 : 32;
      for (let x = bw; x < w; x += 64) {
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + bh); ctx.stroke();
      }
    }
  });

  const floorTex = makeTex(128, 128, (ctx, w, h) => {
    const ts = 32;
    for (let z = 0; z < 4; z++) {
      for (let x = 0; x < 4; x++) {
        const base = (x + z) % 2 === 0 ? [195, 188, 175] : [175, 168, 155];
        const r = base[0] + (Math.random()-0.5)*8;
        const g = base[1] + (Math.random()-0.5)*8;
        const b = base[2] + (Math.random()-0.5)*8;
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(x*ts+1, z*ts+1, ts-1, ts-1);
      }
    }
    for (let i = 0; i < 400; i++) {
      ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.04})`;
      ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
    }
  });

  const ceilTex = makeTex(128, 128, (ctx, w, h) => {
    ctx.fillStyle = '#e0d8cc';
    ctx.fillRect(0, 0, w, h);
    for (let i = 0; i < 600; i++) {
      ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.03})`;
      ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
    }
    ctx.strokeStyle = 'rgba(180,175,165,0.4)';
    ctx.lineWidth = 1;
    for (let y = 0; y < h; y += 32) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
    for (let x = 0; x < w; x += 32) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  });

  const corridorTex = makeTex(128, 128, (ctx, w, h) => {
    const ts = 32;
    for (let z = 0; z < 4; z++) {
      for (let x = 0; x < 4; x++) {
        const base = (x + z) % 2 === 0 ? [140, 132, 118] : [155, 147, 132];
        ctx.fillStyle = `rgb(${base[0]},${base[1]},${base[2]})`;
        ctx.fillRect(x*ts+1, z*ts+1, ts-1, ts-1);
      }
    }
  });

  const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 0.85, metalness: 0.02 });
  const floorMat = new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.65, metalness: 0.05 });
  const ceilMat = new THREE.MeshStandardMaterial({ map: ceilTex, roughness: 0.9 });
  const corridorFloorMat = new THREE.MeshStandardMaterial({ map: corridorTex, roughness: 0.6, metalness: 0.05 });
  const baseboardMat = new THREE.MeshStandardMaterial({ color: 0x3a3530, roughness: 0.6, metalness: 0.1 });
  const pillarMat = new THREE.MeshStandardMaterial({ color: 0xa09585, roughness: 0.7, metalness: 0.05 });
  const stairMat = new THREE.MeshStandardMaterial({ color: 0x888078, roughness: 0.75, metalness: 0.08 });
  const lightFixMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xfff5e0, emissiveIntensity: 0.8 });

  const floorGeo = new THREE.PlaneGeometry(C, C);
  floorGeo.rotateX(-Math.PI / 2);
  const ceilGeo = new THREE.PlaneGeometry(C, C);
  ceilGeo.rotateX(Math.PI / 2);
  const wallGeoH = new THREE.BoxGeometry(C + 0.1, WH, 0.2);
  const wallGeoV = new THREE.BoxGeometry(0.2, WH, C + 0.1);
  const baseboardGeoH = new THREE.BoxGeometry(C + 0.1, 0.25, 0.04);
  const baseboardGeoV = new THREE.BoxGeometry(0.04, 0.25, C + 0.1);
  const pillarGeo = new THREE.BoxGeometry(0.45, WH, 0.45);
  const lightFixGeo = new THREE.BoxGeometry(0.6, 0.05, 0.6);

  function genLayout(floorIdx) {
    const rng = mulberry32(floorIdx * 31337 + 42);
    const map = [];
    for (let z = 0; z < GH; z++) {
      map[z] = [];
      for (let x = 0; x < GW; x++) map[z][x] = 1;
    }
    const rooms = [];

    const mcX = Math.floor(halfW);
    const mcZ = Math.floor(halfH);

    for (let z = 1; z < GH - 1; z++) { map[z][mcX - 1] = 0; map[z][mcX] = 0; }
    for (let x = 1; x < GW - 1; x++) { map[mcZ - 1][x] = 0; map[mcZ][x] = 0; }

    const numSides = 2 + Math.floor(rng() * 3);
    for (let s = 0; s < numSides; s++) {
      const isVert = s < numSides / 2;
      if (isVert) {
        const cx = 6 + Math.floor(rng() * (mcX - 9));
        for (let z = 1; z < GH - 1; z++) { map[z][cx] = 0; if (cx + 1 < GW - 1) map[z][cx + 1] = 0; }
        const cz = Math.min(mcZ - 2, Math.max(2, mcZ + Math.floor((rng() - 0.5) * 10)));
        for (let x = Math.min(cx, mcX - 1); x <= Math.max(cx, mcX); x++) map[cz][x] = 0;
      } else {
        const cz = 6 + Math.floor(rng() * (mcZ - 9));
        for (let x = 1; x < GW - 1; x++) { map[cz][x] = 0; if (cz + 1 < GH - 1) map[cz + 1][x] = 0; }
      }
    }

    function canPlace(rx, rz, rw, rh) {
      if (rx < 1 || rz < 1 || rx + rw >= GW - 1 || rz + rh >= GH - 1) return false;
      for (let z = rz - 1; z <= rz + rh; z++)
        for (let x = rx - 1; x <= rx + rw; x++)
          if (z >= 0 && z < GH && x >= 0 && x < GW && map[z][x] === 0) return false;
      return true;
    }

    function carveRoom(rx, rz, rw, rh) {
      for (let z = rz; z < rz + rh; z++)
        for (let x = rx; x < rx + rw; x++) map[z][x] = 0;
      const room = { x: rx, z: rz, w: rw, h: rh, cx: rx + Math.floor(rw / 2), cz: rz + Math.floor(rh / 2) };
      rooms.push(room);

      for (let attempt = 0; attempt < 4; attempt++) {
        const side = Math.floor(rng() * 4);
        if (side === 0) {
          const dx = rx + 1 + Math.floor(rng() * Math.max(1, rw - 2));
          for (let dz = rz - 1; dz >= 0; dz--) {
            if (map[dz][dx] === 0) { for (let zz = rz - 1; zz > dz; zz--) map[zz][dx] = 0; return; }
            if (dz === 0 || map[dz - 1][dx] === 0) { for (let zz = rz - 1; zz >= dz; zz--) map[zz][dx] = 0; return; }
          }
        } else if (side === 1) {
          const dx = rx + 1 + Math.floor(rng() * Math.max(1, rw - 2));
          for (let dz = rz + rh; dz < GH; dz++) {
            if (map[dz][dx] === 0) { for (let zz = rz + rh; zz < dz; zz++) map[zz][dx] = 0; return; }
            if (dz === GH - 1 || map[dz + 1][dx] === 0) { for (let zz = rz + rh; zz <= dz; zz++) map[zz][dx] = 0; return; }
          }
        } else if (side === 2) {
          const dz = rz + 1 + Math.floor(rng() * Math.max(1, rh - 2));
          for (let dx = rx - 1; dx >= 0; dx--) {
            if (map[dz][dx] === 0) { for (let xx = rx - 1; xx > dx; xx--) map[dz][xx] = 0; return; }
            if (dx === 0 || map[dz][dx - 1] === 0) { for (let xx = rx - 1; xx >= dx; xx--) map[dz][xx] = 0; return; }
          }
        } else {
          const dz = rz + 1 + Math.floor(rng() * Math.max(1, rh - 2));
          for (let dx = rx + rw; dx < GW; dx++) {
            if (map[dz][dx] === 0) { for (let xx = rx + rw; xx < dx; xx++) map[dz][xx] = 0; return; }
            if (dx === GW - 1 || map[dz][dx + 1] === 0) { for (let xx = rx + rw; xx <= dx; xx++) map[dz][xx] = 0; return; }
          }
        }
      }
    }

    for (let i = 0; i < 150; i++) {
      const rw = 4 + Math.floor(rng() * 7);
      const rh = 4 + Math.floor(rng() * 7);
      const rx = 1 + Math.floor(rng() * (GW - rw - 2));
      const rz = 1 + Math.floor(rng() * (GH - rh - 2));
      if (canPlace(rx, rz, rw, rh)) carveRoom(rx, rz, rw, rh);
    }

    for (let z = 0; z < GH; z++) { map[z][0] = 1; map[z][GW - 1] = 1; }
    for (let x = 0; x < GW; x++) { map[0][x] = 1; map[GH - 1][x] = 1; }

    return { map, rooms };
  }

  function addMesh(geo, mat, px, py, pz) {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(px, py, pz);
    m.castShadow = true;
    m.receiveShadow = true;
    scene.add(m);
    addColliderFromMesh(m);
    return m;
  }

  function buildLevel(baseY, layout) {
    const { map, rooms } = layout;

    for (let z = 0; z < GH; z++) {
      for (let x = 0; x < GW; x++) {
        if (map[z][x] !== 0) continue;
        const wx = (x - halfW) * C;
        const wz = (z - halfH) * C;
        const isCorridor = Math.abs(x - mcX) <= 1 || Math.abs(z - mcZ) <= 1;
        addMesh(floorGeo, isCorridor ? corridorFloorMat : floorMat, wx, baseY, wz);
        addMesh(ceilGeo, ceilMat, wx, baseY + WH, wz);

        if (z > 0 && map[z - 1][x] === 1) {
          addMesh(wallGeoH, wallMat, wx, baseY + WH / 2, wz - C / 2);
          addMesh(baseboardGeoH, baseboardMat, wx, baseY + 0.125, wz - C / 2 + 0.12);
        }
        if (z < GH - 1 && map[z + 1][x] === 1) {
          addMesh(wallGeoH, wallMat, wx, baseY + WH / 2, wz + C / 2);
          addMesh(baseboardGeoH, baseboardMat, wx, baseY + 0.125, wz + C / 2 - 0.12);
        }
        if (x > 0 && map[z][x - 1] === 1) {
          addMesh(wallGeoV, wallMat, wx - C / 2, baseY + WH / 2, wz);
          addMesh(baseboardGeoV, baseboardMat, wx - C / 2 + 0.12, baseY + 0.125, wz);
        }
        if (x < GW - 1 && map[z][x + 1] === 1) {
          addMesh(wallGeoV, wallMat, wx + C / 2, baseY + WH / 2, wz);
          addMesh(baseboardGeoV, baseboardMat, wx + C / 2 - 0.12, baseY + 0.125, wz);
        }
      }
    }

    for (const room of rooms) {
      if (room.w >= 5 && room.h >= 5) {
        const corners = [
          [room.x + 1, room.z + 1], [room.x + room.w - 2, room.z + 1],
          [room.x + 1, room.z + room.h - 2], [room.x + room.w - 2, room.z + room.h - 2],
        ];
        for (const [px, pz] of corners) {
          if (px > 0 && px < GW && pz > 0 && pz < GH && map[pz][px] === 0) {
            addMesh(pillarGeo, pillarMat, (px - halfW) * C, baseY + WH / 2, (pz - halfH) * C);
          }
        }
      }
    }

    for (const room of rooms) {
      const lpx = (room.cx - halfW) * C;
      const lpz = (room.cz - halfH) * C;
      addMesh(lightFixGeo, lightFixMat, lpx, baseY + WH - 0.04, lpz);
      const pl = new THREE.PointLight(0xfff0d4, 0.5, 14, 1.5);
      pl.position.set(lpx, baseY + WH - 0.2, lpz);
      scene.add(pl);
    }

    for (let z = 3; z < GH - 3; z += 6) {
      for (let x = 3; x < GW - 3; x += 6) {
        if (map[z][x] === 0 && (Math.abs(x - mcX) <= 1 || Math.abs(z - mcZ) <= 1)) {
          const lpx = (x - halfW) * C;
          const lpz = (z - halfH) * C;
          addMesh(lightFixGeo, lightFixMat, lpx, baseY + WH - 0.04, lpz);
          const pl = new THREE.PointLight(0xfff5e0, 0.3, 10, 1.5);
          pl.position.set(lpx, baseY + WH - 0.2, lpz);
          scene.add(pl);
        }
      }
    }
  }

  function buildStairwell(sx, sz, startFloor, endFloor) {
    const steps = 14;
    const stepH = WH / steps;
    const stepW = C * 1.2;
    const stepD = 0.3;
    for (let f = startFloor; f < endFloor; f++) {
      const baseY = f * WH;
      for (let i = 0; i < steps; i++) {
        const geo = new THREE.BoxGeometry(stepW, stepH * 0.9, stepD);
        const m = new THREE.Mesh(geo, stairMat);
        m.position.set((sx - halfW) * C, baseY + stepH * (i + 0.5), (sz - halfH) * C + (i - steps / 2) * stepD);
        m.castShadow = true; m.receiveShadow = true;
        scene.add(m); addColliderFromMesh(m);
      }
      addMesh(new THREE.BoxGeometry(stepW, 0.15, C), stairMat, (sx - halfW) * C, baseY + WH, (sz - halfH) * C);
    }
  }

  const mcX = Math.floor(halfW);

  const mcZ = Math.floor(halfH);

  for (let f = 0; f < FLOORS; f++) {
    const layout = genLayout(f);
    proceduralLayouts.push(layout);
    buildLevel(f * WH, layout);
  }

  buildStairwell(5, 5, 0, FLOORS);
  buildStairwell(GW - 6, GH - 6, 0, FLOORS);
  buildStairwell(5, GH - 6, 0, FLOORS);
  buildStairwell(GW - 6, 5, 0, FLOORS);

  for (let i = colliders.length - 1; i >= 0; i--) {
    const b = colliders[i];
    if (b.max.y - b.min.y < 0.3 || (b.max.x - b.min.x) > 30 || (b.max.z - b.min.z) > 30) colliders.splice(i, 1);
  }

  scene.background = new THREE.Color(0xc8c0b8);
  scene.fog = new THREE.Fog(0xc8c0b8, 50, 140);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
